<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8773a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="藏·索引">
<title>藏·索引</title>
<link rel="manifest" id="pwa-manifest">
<link rel="icon" id="site-favicon" href="img/logo.ico" type="image/x-icon">
<link rel="apple-touch-icon" id="apple-touch-icon" href="img/logo.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== TOKENS ===== */
:root{
  --bg:#f6f3ee;--bg2:#edeae3;--bg3:#e3dfd7;
  --sur:#ffffff;--sur2:#f2efe8;
  --bd:#d5d0c6;
  --tx:#1a1714;--tx2:#5c5650;--tx3:#8e8880;
  --ac:#c8773a;--ac2:#a05e2c;--acl:#f5e4d2;
  --red:#ef4444;--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --sh:0 2px 10px rgba(0,0,0,.07);
  --shl:0 8px 30px rgba(0,0,0,.12);
  --r:12px;--rs:8px;--rl:20px;
  --tr:.22s cubic-bezier(.4,0,.2,1);
  --fs:'Noto Serif SC',serif;
  --fn:'Noto Sans SC',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --sw:228px;
}
[data-dark]{
  --bg:#0e0d0c;--bg2:#171614;--bg3:#1f1e1c;
  --sur:#1b1a18;--sur2:#222120;
  --bd:#2e2c2a;
  --tx:#f0ece5;--tx2:#9e9890;--tx3:#6e6860;
  --ac:#e8924a;--ac2:#c87230;--acl:#271a0e;
  --sh:0 2px 10px rgba(0,0,0,.3);
  --shl:0 8px 30px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
button{font-family:var(--fn);cursor:pointer}
a{color:inherit;text-decoration:none}
img{max-width:100%}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sw);background:var(--bg2);border-right:1px solid var(--bd);
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  transition:transform var(--tr),background var(--tr);
}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid var(--bd)}
.logo-mark{display:flex;align-items:baseline;gap:6px}
.logo-title{font-family:var(--fs);font-size:20px;font-weight:700;color:var(--ac);letter-spacing:.06em}
.logo-version{font-family:var(--fm);font-size:10px;color:var(--tx3);padding:1px 5px;border:1px solid var(--bd);border-radius:4px}
.logo-sub{font-size:10px;color:var(--tx3);margin-top:2px;font-family:var(--fm);letter-spacing:.08em}

/* GitHub status pill */
.gh-status{
  display:flex;align-items:center;gap:6px;
  margin:10px 18px 0;padding:6px 10px;border-radius:var(--rs);
  font-size:11px;font-family:var(--fm);border:1px solid var(--bd);
  background:var(--sur);cursor:pointer;transition:all var(--tr);
}
.gh-status:hover{border-color:var(--ac)}
.gh-dot{width:7px;height:7px;border-radius:50%;background:var(--bd);flex-shrink:0;transition:background var(--tr)}
.gh-dot.connected{background:var(--green)}
.gh-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.gh-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.sidebar-nav{padding:10px 0;flex:1}
.nav-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);padding:8px 18px 3px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 18px;
  border:none;background:none;width:100%;text-align:left;
  font-size:13.5px;color:var(--tx2);cursor:pointer;position:relative;
  transition:background var(--tr),color var(--tr);
}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.active{background:var(--acl);color:var(--ac);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
.nav-item .ni{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-item .nc{margin-left:auto;font-size:10px;font-family:var(--fm);background:var(--bg3);color:var(--tx3);border-radius:9px;padding:1px 6px}
.nav-item.active .nc{background:var(--acl);color:var(--ac)}
/* guest space account */
.nav-item.space-item{border-top:1px solid var(--bd);margin-top:4px;color:var(--blue);font-size:12px}
.nav-item.space-item .ni{font-size:14px}

.sidebar-foot{padding:10px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:5px}
.sfoot-btn{
  display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--rs);
  font-size:12px;color:var(--tx2);border:1px solid var(--bd);background:var(--sur);
  transition:all var(--tr);width:100%;text-align:left;
}
.sfoot-btn:hover{background:var(--bg3);color:var(--tx);border-color:var(--tx3)}

.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky;top:0;z-index:90;
  background:rgba(246,243,238,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);
  padding:12px 24px;display:flex;align-items:center;gap:12px;
  transition:background var(--tr);
}
[data-dark] .topbar{background:rgba(14,13,12,.92)}
.topbar-title{font-family:var(--fs);font-size:18px;font-weight:600;flex:1;display:flex;align-items:center;gap:8px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.search-wrap{
  display:flex;align-items:center;gap:7px;
  background:var(--sur);border:1px solid var(--bd);border-radius:var(--rs);
  padding:5px 11px;flex:1;max-width:300px;transition:all var(--tr);
}
.search-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.search-wrap input{border:none;background:transparent;font-size:13px;color:var(--tx);font-family:var(--fn);outline:none;width:100%}
.search-wrap input::placeholder{color:var(--tx3)}
.ibtn{
  width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--sur);display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--tx2);transition:all var(--tr);flex-shrink:0;
}
.ibtn:hover{background:var(--bg3);color:var(--tx)}
.ibtn.on{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* ===== GUEST BANNER ===== */
.guest-banner{
  display:flex;align-items:center;gap:12px;
  margin:16px 24px 0;padding:12px 16px;
  background:linear-gradient(135deg,var(--acl),var(--sur2));
  border:1px solid var(--ac);border-radius:var(--r);
  font-size:13px;color:var(--tx2);
}
.guest-banner .gb-icon{font-size:22px}
.guest-banner strong{color:var(--ac)}
.guest-banner .gb-btns{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
.gbtn{padding:5px 12px;border-radius:var(--rs);font-size:12px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);transition:all var(--tr)}
.gbtn:hover{border-color:var(--ac);color:var(--ac)}
.gbtn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.gbtn.primary:hover{background:var(--ac2)}

/* ===== CONTENT ===== */
.content{padding:20px 24px;flex:1}

/* ===== FILTER ===== */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.ftag{
  padding:4px 11px;border-radius:18px;font-size:12px;
  border:1px solid var(--bd);background:var(--sur);color:var(--tx2);
  transition:all var(--tr);white-space:nowrap;
}
.ftag:hover{border-color:var(--ac);color:var(--ac)}
.ftag.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.ftag.local-tag{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ===== VIEW CONTROLS ===== */
.vctrl{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.vctrl-l{flex:1;display:flex;gap:8px;align-items:center}
.sel{
  padding:5px 10px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--sur);color:var(--tx);font-size:12px;font-family:var(--fn);
  outline:none;cursor:pointer;transition:border var(--tr);
}
.sel:focus{border-color:var(--ac)}
.rcnt{font-size:12px;color:var(--tx3);font-family:var(--fm)}
.vbtns{display:flex;gap:3px}
.vbtn{
  width:30px;height:30px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--sur);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--tx3);transition:all var(--tr);
}
.vbtn:hover{color:var(--tx)}
.vbtn.on{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* ===== GRID ===== */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;animation:fadeIn .25s}
.grid-card{
  background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);
  overflow:hidden;cursor:pointer;transition:all var(--tr);position:relative;
}
.grid-card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.grid-card.selected-card{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac)}
.cc{width:100%;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.cc img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.cc .no-cover-icon{font-size:38px;opacity:.45}
.grid-card:hover .cc img{transform:scale(1.05)}
.ci{padding:9px 11px}
.ct{font-size:12.5px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.cm{font-size:11px;color:var(--tx3)}
.crating{font-size:11px;color:var(--amber);margin-top:2px}

/* ===== LIST ===== */
.list-view{display:flex;flex-direction:column;gap:8px;animation:fadeIn .25s}
.list-card{
  background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);
  display:flex;gap:14px;padding:12px;cursor:pointer;transition:all var(--tr);position:relative;
}
.list-card:hover{box-shadow:var(--sh);transform:translateX(3px)}
.list-card.selected-card{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac)}
.lcc{width:62px;aspect-ratio:2/3;border-radius:var(--rs);background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.lcc img{width:100%;height:100%;object-fit:cover;}
.li{flex:1;min-width:0}
.lt{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lm{font-size:11.5px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px}
.ld{font-size:12.5px;color:var(--tx2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ltags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}

/* ===== COMPACT ===== */
.compact-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;animation:fadeIn .25s}
.compact-card{
  background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);
  display:flex;gap:10px;padding:9px;cursor:pointer;transition:all var(--tr);align-items:center;
}
.compact-card:hover{box-shadow:var(--sh);border-color:var(--ac)}
.compact-card.selected-card{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac)}
.ccc{width:44px;aspect-ratio:2/3;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.ccc img{width:100%;height:100%;object-fit:cover;}
.cki{flex:1;min-width:0}
.ckt{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ckm{font-size:11px;color:var(--tx3);margin-top:1px}

/* ===== STATUS BADGE ===== */
.sbadge{
  display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;
  font-size:10px;font-weight:600;white-space:nowrap;
}
.sbadge.watched{background:#22c55e;color:#fff;border:1px solid #16a34a}
.sbadge.watching{background:#f59e0b;color:#fff;border:1px solid #d97706}
.sbadge.unwatched{background:rgba(100,100,100,.75);color:#fff;border:1px solid rgba(80,80,80,.5);backdrop-filter:blur(2px)}
.sbadge.local{background:#3b82f6;color:#fff;border:1px solid #2563eb}
/* abs badge on grid card covers gets a shadow for readability */
.abs-badge .sbadge{box-shadow:0 1px 4px rgba(0,0,0,.35)}

/* card checkbox */
.cbox{
  position:absolute;top:7px;left:7px;width:19px;height:19px;border-radius:5px;
  border:2px solid var(--bd);background:var(--sur);display:none;
  align-items:center;justify-content:center;z-index:2;transition:all var(--tr);font-size:11px;
}
.select-mode .cbox{display:flex}
.cbox.ck{background:var(--ac);border-color:var(--ac);color:#fff}
/* abs badge on grid */
.abs-badge{position:absolute;top:7px;right:7px;z-index:1}

/* ===== TAG CHIP ===== */
.tchip{font-size:11px;padding:2px 7px;border-radius:9px;background:var(--bg3);color:var(--tx2);border:none;transition:all var(--tr)}
/* no-cover placeholder icons have reduced opacity, NOT the container */
.lcc .no-cover-icon,.ccc .no-cover-icon{opacity:.45}
.tchip:hover{background:var(--acl);color:var(--ac);cursor:pointer}

/* ===== SELECT BAR ===== */
.sel-bar{
  display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);
  padding:9px 18px;box-shadow:var(--shl);gap:10px;align-items:center;z-index:200;
  animation:slideUp .25s;
}
.sel-bar.show{display:flex}
.sel-cnt{font-size:13px;font-weight:700;color:var(--ac);font-family:var(--fm)}
.sact{padding:5px 12px;border-radius:18px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx);font-size:12px;transition:all var(--tr)}
.sact:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.sact.danger{color:var(--red)}
.sact.danger:hover{background:var(--red);border-color:var(--red);color:#fff}

/* ===== MODAL ===== */
.moverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(4px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .18s;
}
.modal{
  background:var(--sur);border-radius:var(--rl);width:100%;
  max-height:92vh;overflow-y:auto;box-shadow:var(--shl);
  animation:slideUp .28s cubic-bezier(.4,0,.2,1);border:1px solid var(--bd);
}
.mhd{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mtt{font-family:var(--fs);font-size:18px;font-weight:600}
.mclose{width:30px;height:30px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--tx2);transition:all var(--tr)}
.mclose:hover{background:var(--bg3);color:var(--tx)}
.mbody{padding:16px 24px 24px}
.mfoot{padding:14px 24px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}

/* ===== FORM ===== */
.fg{margin-bottom:15px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.fi{
  width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rs);
  background:var(--bg);color:var(--tx);font-size:13.5px;font-family:var(--fn);
  outline:none;transition:all var(--tr);
}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
textarea.fi{resize:vertical;min-height:72px}
.fhint{font-size:11px;color:var(--tx3);margin-top:3px}

/* cover upload */
.cover-area{
  border:2px dashed var(--bd);border-radius:var(--r);text-align:center;
  cursor:pointer;transition:all var(--tr);background:var(--bg);position:relative;overflow:hidden;
}
.cover-area:hover{border-color:var(--ac);background:var(--acl)}
.cover-ph{padding:20px;font-size:13px;color:var(--tx3)}
.cover-ph .cpi{font-size:30px;margin-bottom:6px}
.cover-prev{width:100%;aspect-ratio:2/3;object-fit:cover;display:none;max-height:200px;border-radius:calc(var(--r) - 2px)}
.cover-area.has-img .cover-ph{display:none}
.cover-area.has-img .cover-prev{display:block}
.cover-row{display:flex;gap:7px;margin-top:7px}
.cover-row .fi{margin:0}

/* buttons */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;font-family:var(--fn);border:1px solid var(--bd);background:var(--sur2);color:var(--tx);transition:all var(--tr)}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.primary:hover{background:var(--ac2);border-color:var(--ac2)}
.btn.danger{color:var(--red);border-color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.sm{padding:5px 10px;font-size:12px}

/* link list */
.ll{display:flex;flex-direction:column;gap:7px}
.li-row{display:flex;gap:7px;align-items:center}
.li-row .fi{margin:0}
.lrm{width:28px;height:28px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur2);display:flex;align-items:center;justify-content:center;color:var(--red);flex-shrink:0;font-size:15px;transition:all var(--tr)}
.lrm:hover{background:#fee2e2}
.add-link-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border:1px dashed var(--bd);border-radius:var(--rs);background:transparent;color:var(--tx3);font-size:12px;transition:all var(--tr);margin-top:3px;font-family:var(--fn)}
.add-link-btn:hover{border-color:var(--ac);color:var(--ac)}

/* tag selector */
.tsec{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 5px;width:100%}
.topt{padding:3px 9px;border-radius:18px;font-size:12px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);transition:all var(--tr)}
.topt:hover{border-color:var(--ac);color:var(--ac)}
.topt.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* status selector (radio style) */
.status-opts{display:flex;gap:7px}
.sopt{padding:5px 13px;border-radius:18px;font-size:12px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);transition:all var(--tr)}
.sopt:hover{border-color:var(--ac)}
.sopt.watched.on{background:#22c55e;color:#fff;border-color:#22c55e}
.sopt.watching.on{background:#f59e0b;color:#fff;border-color:#f59e0b}
.sopt.unwatched.on{background:var(--tx3);color:#fff;border-color:var(--tx3)}

/* rating */
.stars{display:flex;gap:2px;align-items:center}
/* Half-star rating system */
.star-wrap{position:relative;width:20px;height:20px;cursor:pointer;font-size:19px;line-height:20px}
.star-wrap .star-bg{color:var(--bd)}
.star-wrap .star-fill{position:absolute;top:0;left:0;overflow:hidden;color:var(--amber);white-space:nowrap}
.star-wrap:hover .star-bg{color:#fcd97a}
.star-label{font-size:12px;color:var(--tx3);font-family:var(--fm);margin-left:6px;min-width:24px}
.mini-stars{display:inline-flex;align-items:center;gap:1px;font-size:12px}

/* country dropdown */
.country-sel{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:13.5px;font-family:var(--fn);outline:none;cursor:pointer;transition:border var(--tr)}
.country-sel:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}

/* ===== DETAIL ===== */
.det-modal{max-width:720px}
.det-hd{display:flex;gap:22px;margin-bottom:20px}
.det-cov{width:108px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.5}
.det-cov img{width:100%;height:100%;object-fit:cover;opacity:1}
.det-info{flex:1;min-width:0}
.det-title{font-family:var(--fs);font-size:20px;font-weight:700;margin-bottom:7px;line-height:1.3}
.det-metas{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.det-meta{font-size:12.5px;color:var(--tx2)}
.det-meta strong{color:var(--tx3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-right:5px}
.det-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.det-link{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:18px;background:var(--acl);color:var(--ac);font-size:12.5px;font-weight:500;border:1px solid var(--ac);transition:all var(--tr)}
.det-link:hover{background:var(--ac);color:#fff}
.det-sec{margin-bottom:18px}
.det-sec-t{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.mdc{font-size:13.5px;line-height:1.8;color:var(--tx2)}
.mdc p{margin-bottom:10px}
.mdc h1,.mdc h2,.mdc h3{color:var(--tx);font-family:var(--fs);margin:14px 0 6px}
.mdc code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:var(--fm);font-size:12px}
.mdc blockquote{border-left:3px solid var(--ac);padding-left:11px;color:var(--tx3);font-style:italic}
.mdc ul,.mdc ol{padding-left:18px}
.mdc li{margin-bottom:3px}

/* ===== STATS ===== */
.stats-mini{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;margin-bottom:18px}
.scard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.sv{font-size:24px;font-weight:700;font-family:var(--fm);color:var(--ac)}
.sl{font-size:11px;color:var(--tx3);margin-top:2px}

/* ===== SETTINGS ===== */
.stg-sec{margin-bottom:24px}
.stg-tt{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.stg-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.stg-row:last-child{border-bottom:none}
.stg-lbl{flex:1}
.stg-name{font-size:13.5px;font-weight:500}
.stg-desc{font-size:11.5px;color:var(--tx3);margin-top:1px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg3);position:relative;border:none;cursor:pointer;transition:background var(--tr);flex-shrink:0}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}

/* ===== EMPTY ===== */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--tx3);text-align:center}
.empty-i{font-size:52px;margin-bottom:14px;opacity:.45}
.empty-t{font-size:15px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.empty-s{font-size:12.5px;line-height:1.7;max-width:260px}

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:26px;right:26px;width:52px;height:52px;border-radius:50%;
  background:var(--ac);color:#fff;border:none;display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 18px rgba(200,119,58,.45);transition:all var(--tr);z-index:150;
}
.fab:hover{transform:scale(1.1) rotate(90deg);background:var(--ac2)}

/* ===== TOAST ===== */
.toasts{position:fixed;bottom:22px;right:22px;z-index:1000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);
  padding:10px 14px;font-size:12.5px;box-shadow:var(--shl);
  display:flex;align-items:center;gap:9px;pointer-events:auto;
  animation:slideInR .25s;max-width:280px;
}
.toast.ok{border-color:#22c55e44}
.toast.err{border-color:#ef444444}
.toast.info{border-color:#3b82f644}

/* ===== ABOUT ===== */
.about-hero{
  background:linear-gradient(135deg,var(--acl) 0%,var(--sur2) 100%);
  border:1px solid var(--ac);border-radius:var(--rl);padding:28px 32px;margin-bottom:22px;
  display:flex;align-items:center;gap:20px;
}
.about-logo{font-size:52px}
.about-title{font-family:var(--fs);font-size:26px;font-weight:700;color:var(--ac);margin-bottom:4px}
.about-sub{font-size:13px;color:var(--tx2);line-height:1.7}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.feat{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.feat-i{font-size:24px;margin-bottom:8px}
.feat-t{font-size:13px;font-weight:600;margin-bottom:4px}
.feat-d{font-size:12px;color:var(--tx3);line-height:1.6}

/* ===== OVERLAY SIDEBAR ===== */
.sidebar-ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInR{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-ovl.show{display:block}
  .main{margin-left:0}
  .topbar{padding:10px 14px 10px 52px}
  .content{padding:14px}
  .grid-view{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .compact-view{grid-template-columns:1fr}
  .det-hd{flex-direction:column}
  .fab{bottom:18px;right:18px;width:46px;height:46px;font-size:19px}
  .about-hero{flex-direction:column;text-align:center}
}
.mob-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur);align-items:center;justify-content:center;font-size:16px;box-shadow:var(--sh)}
@media(max-width:768px){.mob-toggle{display:flex}}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app" id="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:9px">
      <div style="width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--ac);display:flex;align-items:center;justify-content:center">
        <img id="site-logo-img" src="img/logo.ico" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
      </div>
      <div>
        <div style="display:flex;align-items:baseline;gap:5px">

        </div>

  </div>
  <nav class="sidebar-nav">

    </button>
    <button class="nav-item" data-page="anime" onclick="navigateTo('anime')">

    </button>
    <button class="nav-item" data-page="movies" onclick="navigateTo('movies')">
      <span class="ni">🎬</span>电影<span class="nc" id="cnt-movies">0</span>
    </button>

    <!-- Custom categories injected here by JS -->

    </div>

      <span class="ni">📊</span>统计

    <button class="nav-item" data-page="about" onclick="navigateTo('about')">
      <span class="ni">💡</span>关于本站
    </button>
    <button class="nav-item" data-page="settings" onclick="navigateTo('settings')">
      <span class="ni">⚙️</span>设置
    </button>
    <!-- Space accounts injected here -->
    <div id="space-nav"></div>
  </nav>
  <div class="sidebar-foot">
    <button class="sfoot-btn" onclick="openExportModal()">📤 导出数据</button>
    <button class="sfoot-btn" onclick="triggerImport()">📥 导入数据</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)">
  </div>
</aside>
<div class="sidebar-ovl" id="sidebar-ovl" onclick="closeSidebar()"></div>

<!-- MOB TOGGLE -->
<button class="mob-toggle" onclick="toggleSidebar()">☰</button>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">📚 图书</div>
    <div class="topbar-actions">
      <div class="search-wrap" id="search-wrap-el">
        <span>🔍</span>
        <input type="text" placeholder="全局搜索所有分类..." id="search-inp" oninput="onSearch()" onfocus="showGlobalSearchHint()" onkeydown="if(event.key==='Escape'){clearSearch()}">
        <button id="search-clear-btn" onclick="clearSearch()" style="display:none;background:none;border:none;color:var(--tx3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1">×</button>
      </div>
      <button class="ibtn" id="sel-btn" onclick="toggleSelectMode()" title="多选" style="display:none">☑️</button>
      <button class="ibtn" onclick="toggleDark()" id="dark-btn" title="深色模式">🌙</button>
    </div>
  </div>
  <div id="guest-banner-wrap"></div>
  <div class="content" id="content"></div>
</main>

<button class="fab" id="fab" onclick="openAddModal()" title="添加收藏" style="display:none">＋</button>

<!-- SELECT BAR -->
<div class="sel-bar" id="sel-bar">
  <span class="sel-cnt" id="sel-cnt">已选 0 项</span>
  <button class="sact" onclick="moveSelected()">移动分类</button>
  <button class="sact" onclick="changeStatusSelected()">修改状态</button>
  <button class="sact" onclick="tagSelected()">批量标签</button>
  <button class="sact danger" onclick="deleteSelected()">删除</button>
  <button class="sact" onclick="toggleSelectMode()">取消</button>
</div>

<!-- TOASTS -->
<div class="toasts" id="toasts"></div>
</div>

<!-- MODALS ROOT -->
<div id="M"></div>

<script>
// ============================================================
// ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
//
// 藏·索引 — 个人收藏管理平台 v4.1
// 开源项目，欢迎自定义修改
// 外部配置文件: config.js (与本文件同目录)
// 所有可自定义的内容集中在下方 CONFIG 块中
// ============================================================

// ============================================================
// ★ CONFIG — 所有可自定义项目集中在此处 ★
// ★ 也可以将此块内容单独存为 config.js 文件  ★
// ============================================================

// 【1】网站基本信息
const SITE_CONFIG = {
  title: '藏·索引',           // 网站标题（显示在侧边栏logo）
  subtitle: 'MY COLLECTION UNIVERSE',  // 副标题
  version: 'v4.1',
  storageKey: 'coll_v4',      // localStorage 键名（换个名称可清空数据重来）
};

// 【2】收藏分类配置
// 可增减分类，修改 label/icon；type:'book' 显示书籍专属字段，type:'media' 显示集数字段
const CATS = {
  books:  {label:'图书', icon:'📚', type:'book'},
  anime:  {label:'番剧', icon:'🎌', type:'media'},
  movies: {label:'电影', icon:'🎬', type:'media'},
  series: {label:'剧集', icon:'📺', type:'media'},
  other:  {label:'其他', icon:'🗂️', type:'media'},
  // 示例：添加漫画分类（取消注释即可）
  // manga: {label:'漫画', icon:'📕', type:'book'},
};

// 【3】状态选项配置
// id 是内部键名，label 是显示文字，cls 对应 CSS 类名（watched/watching/unwatched）
const STATUS_OPTS = [
  {id:'watched',   label:'✅ 已看', cls:'watched'},
  {id:'watching',  label:'👁️ 在看', cls:'watching'},
  {id:'unwatched', label:'⏳ 未看', cls:'unwatched'},
];

// 【4】国别标签（含国旗 emoji，下拉选择）
// 格式: 'emoji 国名'，可自由增减
const COUNTRIES = [
  '🇨🇳 中国','🇺🇸 美国','🇯🇵 日本','🇩🇪 德国','🇫🇷 法国',
  '🇬🇧 英国','🇰🇷 韩国','🇮🇱 以色列','🇦🇹 奥地利','🇪🇸 西班牙',
  '🇮🇳 印度','🇮🇹 意大利','🇷🇺 俄罗斯','🇨🇦 加拿大','🇦🇺 澳大利亚',
  '🇧🇷 巴西','🇲🇽 墨西哥','🇦🇷 阿根廷','🇸🇪 瑞典','🇳🇴 挪威',
  '🇩🇰 丹麦','🇳🇱 荷兰','🇵🇱 波兰','🇨🇿 捷克','🇵🇹 葡萄牙',
  '🇬🇷 希腊','🇹🇷 土耳其','🇪🇬 埃及','🇿🇦 南非','🇹🇭 泰国',
  '🇻🇳 越南','🇮🇩 印度尼西亚','🇲🇾 马来西亚','🇵🇭 菲律宾','🇸🇬 新加坡',
  '🇺🇦 乌克兰','🇮🇷 伊朗','🇸🇦 沙特','🇦🇪 阿联酋','🇳🇿 新西兰',
];

// 【5】类型标签（可自由增减，支持 emoji 前缀）
// 这些标签会出现在添加/编辑表单的「类型标签」区域
const TYPE_TAGS = [
  '⭐ 精选','🧠 人生探讨','📖 专业书籍','✍️ 文学','🔬 科普',
  '🔍 悬疑','🌆 社会','🌀 玄幻','🧚 奇幻','💪 励志',
  '😌 休闲','📚 小说','🤪 怪诞','🎨 艺术','🏙️ 都市',
  '📱 轻小说','🌌 异世界','⚡ 爽文','👨 男频','👩 女频',
  '💕 后宫','💰 经济','⚔️ 军事','📝 自传','🔮 玄学',
  '⏰ 穿越','🧠 心理','🗺️ 架空','👻 灵异','📐 教科书',
  '🏫 校园','🚀 科幻','🤖 AI','🌊 海洋','🏔️ 冒险',
  '🕊️ 和平','❤️ 言情','😂 喜剧','😢 悲剧','🎭 戏剧',
  '📰 传记','🌿 自然','🎮 游戏改编','🎵 音乐','🏆 体育',
  // 在此添加自定义类型标签，例如:
  // '🌙 睡前读物','🔥 必读推荐',
];

// ============================================================
// DATA & STATE（内部状态，一般无需修改）
// ============================================================
const SK = SITE_CONFIG.storageKey;

let store = {
  items: [],         // main items
  spaces: [],        // [{id,name,items:[]}] imported spaces
  settings: {
    dark: false,
    githubToken: '',
    githubRepo: '',
    githubPath: 'collection.json',
    imgFolder: 'img',
    view: 'grid',
    sortBy: 'createdAt',
    autoSync: true   // auto sync on change when connected
  }
};

// Runtime state
let page = 'books';
let view = 'grid';
let sort = 'createdAt';
let filters = {status:[],tags:[]};
let searchQ = '';
let selectMode = false;
let selected = new Set();
let editId = null;
// tmp form state
let _links = [];
let _cover = '';
let _rating = 0;
let _tags = new Set();
// current space (null = main)
let currentSpace = null;

// ============================================================
// INIT
// ============================================================
function init() {
  try { const s = localStorage.getItem(SK); if(s) store = deepMerge(store, JSON.parse(s)); } catch(e){}
  view = store.settings.view || 'grid';
  sort = store.settings.sortBy || 'createdAt';
  if(store.settings.dark) applyDark(true);
  // Load custom categories from saved settings into CATS
  (store.settings.customCats||[]).forEach(c=>{
    if(!CATS[c.key]) CATS[c.key]={label:c.label,icon:c.icon,type:c.type};
  });
  setupPWA();
  refreshGhStatus();
  renderSpaceNav();
  renderSidebarCats(); // re-render with custom cats
  navigateTo(page);
  updateCounts();
}

function deepMerge(target, source) {
  const r = {...target};
  for(const k of Object.keys(source)) {
    if(source[k] && typeof source[k]==='object' && !Array.isArray(source[k])) r[k] = deepMerge(target[k]||{}, source[k]);
    else r[k] = source[k];
  }
  return r;
}

function save() {
  store.settings.view = view;
  store.settings.sortBy = sort;
  localStorage.setItem(SK, JSON.stringify(store));
}

function isConnected() { return !!(store.settings.githubToken && store.settings.githubRepo); }

// ============================================================
// NAVIGATION
// ============================================================
function navigateTo(p, spaceId=null) {
  currentSpace = spaceId;
  page = p;
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===p && !spaceId);
  });
  document.querySelectorAll('.space-nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.space===spaceId);
  });
  const collPages = Object.keys(CATS); // all categories including custom
  const inColl = collPages.includes(p);
  document.getElementById('fab').style.display = inColl ? 'flex' : 'none';
  document.getElementById('sel-btn').style.display = inColl ? 'flex' : 'none';
  if(selectMode && !inColl) exitSelectMode();
  // topbar title
  const titles = {books:'📚 图书',anime:'🎌 番剧',movies:'🎬 电影',series:'📺 剧集',other:'🗂️ 其他',stats:'📊 统计',about:'💡 关于本站',settings:'⚙️ 设置'};
  if(spaceId) {
    const sp = store.spaces.find(s=>s.id===spaceId);
    document.getElementById('topbar-title').textContent = `📦 ${sp?.name||'空间'}`;
  } else {
    document.getElementById('topbar-title').textContent = titles[p]||p;
  }
  renderGuestBanner();
  renderContent();
  closeSidebar();
}

// ============================================================
// GUEST BANNER
// ============================================================
function renderGuestBanner() {
  const w = document.getElementById('guest-banner-wrap');
  const collPages = Object.keys(CATS); // all categories including custom
  if(!collPages.includes(page) || isConnected()) { w.innerHTML=''; return; }
  w.innerHTML=`<div class="guest-banner">
    <span class="gb-icon">🔒</span>
    <div>
      <strong>只读浏览模式</strong> — 未连接 GitHub 仓库。<br>
      <span style="font-size:12px">你可以新增本地记录（标记为"本地"），连接后可同步上传。</span>
    </div>
    <div class="gb-btns">
      <button class="gbtn primary" onclick="navigateTo('settings')">连接 GitHub</button>
    </div>
  </div>`;
}

// ============================================================
// RENDER CONTENT
// ============================================================
function renderContent() {
  const c = document.getElementById('content');
  if(currentSpace) { c.innerHTML = renderSpacePage(); return; }
  if(page==='stats') { c.innerHTML = renderStats(); return; }
  if(page==='settings') { c.innerHTML = renderSettings(); bindSettingsEvents(); return; }
  if(page==='about') { c.innerHTML = renderAbout(); return; }
  // collection page
  const items = getFilteredItems();
  c.innerHTML = renderFilterBar() + renderViewCtrl(items.length) + (items.length ? renderItems(items) : renderEmpty());
}

// ============================================================
// ITEMS (from main store or space)
// ============================================================
function getItems() {
  if(currentSpace) {
    const sp = store.spaces.find(s=>s.id===currentSpace);
    return sp ? sp.items.filter(i=>i.category===page) : [];
  }
  return store.items.filter(i=>i.category===page);
}

function getFilteredItems() {
  let items = getItems();
  if(searchQ) {
    const q = searchQ.toLowerCase();
    items = items.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.author||'').toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q));
  }
  if(filters.status.length) items = items.filter(i=>filters.status.includes(i.status));
  if(filters.tags.length) items = items.filter(i=>filters.tags.every(t=>i.tags?.includes(t)));
  items.sort((a,b)=>{
    if(sort==='title') return (a.title||'').localeCompare(b.title||'','zh');
    if(sort==='rating') return (b.rating||0)-(a.rating||0);
    if(sort==='year') return (b.year||'')>(a.year||'')?1:-1;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  return items;
}

// ============================================================
// FILTER BAR
// ============================================================
function renderFilterBar() {
  const allItems = getItems();
  const allTags = [...new Set(allItems.flatMap(i=>i.tags||[]))];
  const countries = allTags.filter(t=>COUNTRIES.includes(t));
  const types = allTags.filter(t=>TYPE_TAGS.includes(t));
  const hasLocal = allItems.some(i=>i.local);
  const hasFilters = filters.status.length||filters.tags.length;

  let html = `<div class="filter-row">`;
  html += `<span style="font-size:11px;color:var(--tx3);flex-shrink:0;align-self:center">状态</span>`;
  getAllStatusOpts().forEach(s=>{
    html+=`<button class="ftag${filters.status.includes(s.id)?' on':''}" onclick="toggleStatusFilter('${s.id}')">${s.label}</button>`;
  });
  if(hasLocal) html+=`<button class="ftag${filters.tags.includes('__local__')?' on local-tag':''}" onclick="toggleTagFilter('__local__')">📍 本地</button>`;
  if(countries.length) {
    html+=`<span style="font-size:11px;color:var(--tx3);margin-left:4px;flex-shrink:0;align-self:center">国别</span>`;
    countries.forEach(t=>{ html+=`<button class="ftag${filters.tags.includes(t)?' on':''}" onclick="toggleTagFilter(\`${esc(t)}\`)">${eh(t)}</button>`; });
  }
  if(types.length) {
    html+=`<span style="font-size:11px;color:var(--tx3);margin-left:4px;flex-shrink:0;align-self:center">类型</span>`;
    types.forEach(t=>{ html+=`<button class="ftag${filters.tags.includes(t)?' on':''}" onclick="toggleTagFilter(\`${esc(t)}\`)">${eh(t)}</button>`; });
  }
  if(hasFilters) html+=`<button class="ftag" onclick="clearFilters()" style="color:var(--red);border-color:var(--red)">✕ 清除筛选</button>`;
  html+=`</div>`;
  return html;
}

function toggleStatusFilter(id) {
  const i = filters.status.indexOf(id);
  if(i>-1) filters.status.splice(i,1);
  else filters.status.push(id);
  renderContent();
}
function toggleTagFilter(t) {
  const i = filters.tags.indexOf(t);
  if(i>-1) filters.tags.splice(i,1);
  else filters.tags.push(t);
  renderContent();
}
function clearFilters() { filters={status:[],tags:[]}; renderContent(); }

// GLOBAL SEARCH
// ============================================================
function onSearch() {
  searchQ = document.getElementById('search-inp').value;
  const clearBtn = document.getElementById('search-clear-btn');
  if(clearBtn) clearBtn.style.display = searchQ ? 'block' : 'none';
  if(searchQ.trim().length >= 1) {
    renderGlobalSearch(searchQ.trim());
  } else {
    renderContent();
  }
}

function clearSearch() {
  searchQ = '';
  const inp = document.getElementById('search-inp');
  if(inp) inp.value = '';
  const clearBtn = document.getElementById('search-clear-btn');
  if(clearBtn) clearBtn.style.display = 'none';
  renderContent();
}

function showGlobalSearchHint() {
  // no-op, hint is in placeholder
}

function renderGlobalSearch(q) {
  const lower = q.toLowerCase();
  // Search main store across all categories
  const mainResults = store.items.filter(i =>
    (i.title||'').toLowerCase().includes(lower) ||
    (i.author||'').toLowerCase().includes(lower) ||
    (i.desc||'').toLowerCase().includes(lower) ||
    (i.publisher||'').toLowerCase().includes(lower) ||
    (i.cast||'').toLowerCase().includes(lower) ||
    (i.voice||'').toLowerCase().includes(lower) ||
    (i.tags||[]).some(t=>t.toLowerCase().includes(lower))
  );
  // Search spaces
  const spaceResults = [];
  store.spaces.forEach(sp => {
    sp.items.filter(i =>
      (i.title||'').toLowerCase().includes(lower) ||
      (i.author||'').toLowerCase().includes(lower) ||
      (i.desc||'').toLowerCase().includes(lower) ||
      (i.tags||[]).some(t=>t.toLowerCase().includes(lower))
    ).forEach(i => spaceResults.push({...i, _spaceName: sp.name, _spaceId: sp.id}));
  });

  const total = mainResults.length + spaceResults.length;
  const c = document.getElementById('content');

  // Group main results by category
  const byCat = {};
  mainResults.forEach(i => {
    if(!byCat[i.category]) byCat[i.category] = [];
    byCat[i.category].push(i);
  });

  let html = `<div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:14px;font-weight:600">🔍 搜索 "${eh(q)}"</span>
    <span style="font-size:12px;color:var(--tx3);font-family:var(--fm)">${total} 项结果</span>
    <button class="btn sm" onclick="clearSearch()">清除搜索</button>
  </div>`;

  if(total === 0) {
    html += `<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">未找到结果</div><div class="empty-s">尝试其他关键词</div></div>`;
  } else {
    // Main store results grouped by category
    Object.entries(byCat).forEach(([cat, items]) => {
      const catInfo = CATS[cat] || getAllCats()[cat] || {icon:'📁', label: cat};
      html += `<div style="margin-bottom:18px">
        <div style="font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px">
          <span>${catInfo.icon}</span>${catInfo.label}
          <span style="font-size:11px;font-family:var(--fm);color:var(--tx3);font-weight:400">${items.length} 项</span>
        </div>`;
      // temporarily override currentSpace to null for rendering
      const savedSpace = currentSpace;
      currentSpace = null;
      html += renderList(items);
      currentSpace = savedSpace;
      html += `</div>`;
    });

    // Space results
    if(spaceResults.length) {
      html += `<div style="margin-bottom:18px">
        <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px">
          <span>📦</span>导入空间
          <span style="font-size:11px;font-family:var(--fm);color:var(--tx3);font-weight:400">${spaceResults.length} 项</span>
        </div>`;
      html += `<div class="list-view">`;
      spaceResults.forEach(it => {
        html += `<div class="list-card" onclick="openDetail('${it.id}')">
          <div class="lcc">${coverHTML(it)}</div>
          <div class="li">
            <div class="lt">${eh(it.title||'无标题')} ${statusBadge(it)} <span class="sbadge local">${eh(it._spaceName)}</span></div>
            <div class="lm">
              ${CATS[it.category]?.icon||''} ${CATS[it.category]?.label||it.category}
              ${it.author?`· 👤 ${eh(it.author)}`:''}
            </div>
            ${it.desc?`<div class="ld">${eh(it.desc)}</div>`:''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
  }
  c.innerHTML = html;
}

// ============================================================
function renderItems(items) {
  if(view==='grid') return renderGrid(items);
  if(view==='list') return renderList(items);
  return renderCompact(items);
}

function coverHTML(item) {
  if(item.cover) {
    // accept any image URL including webp, gif, jpg, png etc.
    return `<img src="${ea(item.cover)}" alt="" loading="lazy" onerror="this.style.display='none'">`;
  }
  const allCatsNow = getAllCats();
  return `<div class="no-cover-icon">${allCatsNow[item.category]?.icon||'📄'}</div>`;
}

function statusBadge(item, abs=false) {
  const s=STATUS_OPTS.find(o=>o.id===item.status);
  if(!s) return '';
  const ls={watched:'已看',watching:'在看',unwatched:'未看'};
  const badge=`<span class="sbadge ${s.cls}">${ls[item.status]||''}</span>`;
  return abs ? `<div class="abs-badge">${badge}</div>` : badge;
}

function localBadge(item) {
  return item.local ? `<span class="sbadge local">本地</span>` : '';
}

function renderGrid(items) {
  return `<div class="grid-view${selectMode?' select-mode':''}">

function renderList(items) {
  return `<div class="list-view${selectMode?' select-mode':''}">

    <div class="list-card${selected.has(it.id)?' selected-card':''}" onclick="cardClick('${it.id}')">

function isItemReadonly(item) {
  // readonly if: not connected AND not local
  if(currentSpace) return true; // space items always readonly

function findItem(id) {
  if(currentSpace) {

    return sp?.items.find(i=>i.id===id)||null;
  }
  return store.items.find(i=>i.id===id)||null;
}

function renderMiniStars(r) {

    if(r>=n) html+='<span style="position:relative;display:inline-block;color:var(--bd)">★<span style="position:absolute;left:0;top:0;overflow:hidden;width:100%;color:var(--amber)">★</span></span>';
    else if(r>=n-0.5) html+='<span style="position:relative;display:inline-block;color:var(--bd)">★<span style="position:absolute;left:0;top:0;overflow:hidden;width:50%;color:var(--amber)">★</span></span>';
    else html+='<span style="color:var(--bd)">★</span>';
  }
  return `<span>${html} <span style="font-family:var(--fm);font-size:10px;color:var(--tx3)">${r}</span></span>`;
}

// ---- HALF-STAR RATING ----
// Each star-wrap has left half (n-0.5) and right half (n) click zones
function renderStars(r) {
  let html = '';
  for(let n=1;n<=5;n++){
    const full = r>=n;
    const half = !full && r>=(n-0.5);
    const fillW = full?'100%':half?'50%':'0%';
    html += `<span class="star-wrap" 
      onmousemove="hoverStar(event,this,${n})" 
      onmouseleave="unhoverStars()"
      onclick="clickStar(event,this,${n})">
      <span class="star-bg">★</span>
      <span class="star-fill" style="width:${fillW}">★</span>
    </span>`;
  }
  const lbl = r===0?'未评分':`${r} 分`;
  html += `<span class="star-label" id="star-lbl">${lbl}</span>`;
  return html;
}
function hoverStar(e,el,n){
  const rect=el.getBoundingClientRect();
  const half=e.clientX<rect.left+rect.width/2;
  const v=half?n-0.5:n;
  // preview
  document.querySelectorAll('.star-fill').forEach((sf,i)=>{
    if(v>=(i+1)) sf.style.width='100%';
    else if(v>=(i+0.5)) sf.style.width='50%';
    else sf.style.width='0%';
  });
  const lbl=document.getElementById('star-lbl');
  if(lbl) lbl.textContent=`${v} 分`;
}
function unhoverStars(){
  // restore to _rating
  document.querySelectorAll('.star-fill').forEach((sf,i)=>{
    if(_rating>=(i+1)) sf.style.width='100%';
    else if(_rating>=(i+0.5)) sf.style.width='50%';
    else sf.style.width='0%';
  });
  const lbl=document.getElementById('star-lbl');
  if(lbl) lbl.textContent=_rating===0?'未评分':`${_rating} 分`;
}
function clickStar(e,el,n){
  const rect=el.getBoundingClientRect();
  const half=e.clientX<rect.left+rect.width/2;
  const v=half?n-0.5:n;
  _rating=_rating===v?0:v;
  document.getElementById('stars').innerHTML=renderStars(_rating);
}
function setRating(n){_rating=n;const el=document.getElementById('stars');if(el)el.innerHTML=renderStars(_rating);}

async function uploadLinkFile(e,i){
  const f=e.target.files[0]; if(!f) return;
  const el=document.getElementById(`lf-name-${i}`);
  if(el) el.textContent='上传中...';
  _links[i].filename=f.name;
  _links[i]._uploading=true;
  document.getElementById('ll').innerHTML=renderLinkRows();
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  const assetDir=(assetFolder||'assets/doc').replace(/\/$/,'');
  const path=`${assetDir}/${f.name}`;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result.split(',')[1];
    try{
      let sha=null;
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;}
      const body={message:`Upload asset ${f.name}`,content:b64,...(sha?{sha}:{})};
      const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      if(pr.ok){
        const d=await pr.json();
        _links[i].url=d.content?.download_url||`https://raw.githubusercontent.com/${repo}/main/${path}`;
        _links[i]._uploading=false;
        toast(`${f.name} 已上传`,'ok');
      } else {
        _links[i]._uploading=false;
        toast('文件上传失败','err');
      }
    }catch(err){_links[i]._uploading=false;toast(`错误:${err.message}`,'err');}
    document.getElementById('ll').innerHTML=renderLinkRows();
  };
  reader.readAsDataURL(f);
}
// ---- DELETE GITHUB ASSET ----
// Permanently deletes an uploaded file from GitHub by its download URL
// Called when user removes a file-type link from edit modal or confirms deletion
async function deleteGithubAsset(fileUrl, filename) {
  const {githubToken:tk, githubRepo:repo} = store.settings;
  if(!tk||!repo) { toast('未连接 GitHub，跳过文件删除','info'); return; }
  // Extract repo-relative path from raw.githubusercontent.com URL
  let path = '';
  try {
    const u = new URL(fileUrl);
    if(u.hostname.includes('raw.githubusercontent.com')) {
      // URL format: /owner/repo/branch/path/to/file
      const parts = u.pathname.split('/');
      // skip leading '', owner, repo, branch → path starts at index 4
      path = parts.slice(4).join('/');
    } else {
      // Fallback: use asset folder + filename
      const folder = (store.settings.assetFolder||'assets/doc').replace(/\/$/,'');
      path = `${folder}/${filename}`;
    }
  } catch(e) {
    const folder = (store.settings.assetFolder||'assets/doc').replace(/\/$/,'');
    path = `${folder}/${filename}`;
  }
  if(!path) { toast('无法确定文件路径，请手动删除','err'); return; }
  try {
    // Get current SHA (required for delete)
    const getR = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}
    });
    if(!getR.ok) { toast(`文件不存在或已被删除：${path}`,'info'); return; }
    const fileData = await getR.json();
    // Perform deletion
    const delR = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'DELETE',
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Delete asset ${filename}`, sha: fileData.sha})
    });
    if(delR.ok) toast(`GitHub 文件「${filename}」已永久删除`,'ok');
    else toast('GitHub 文件删除失败，请手动检查仓库','err');
  } catch(e) { toast(`删除出错：${e.message}`,'err'); }
}

function copyToClipboard(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('链接已复制','ok')).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;

  try{document.execCommand('copy');toast('链接已复制','ok');}catch(e){toast('复制失败，请手动复制','err');}
  document.body.removeChild(ta);
}

async function deleteGithubFile(url, filename) {
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  if(!tk||!repo) return;
  // Extract path from URL
  let filePath = '';
  if(filename) {
    const assetDir=(assetFolder||'assets/doc').replace(/\/$/,'');
    filePath = `${assetDir}/${filename}`;
  } else {
    // Try to parse from raw URL
    const m = url.match(/\/main\/(.+)$/);
    if(m) filePath = m[1];
  }
  if(!filePath) { toast('无法确定文件路径，跳过删除','info'); return; }
  try {
    const getR=await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`,{
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}
    });
    if(!getR.ok) { toast('文件不存在或已删除','info'); return; }
    const d=await getR.json();
    const delR=await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`,{
      method:'DELETE',
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Delete ${filename||filePath}`,sha:d.sha})
    });
    if(delR.ok) toast(`文件 ${filename||filePath} 已从 GitHub 删除`,'ok');
    else toast('GitHub 文件删除失败','err');
  } catch(e) { toast(`删除出错：${e.message}`,'err'); }
}

function handleCovFile(e) {
  const f=e.target.files[0]; if(!f) return;
  toast('正在读取图片...','info');
  const r=new FileReader();
  r.onload=ev=>{
    // compress if too large
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=600;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      _cover=canvas.toDataURL('image/jpeg',0.75);
      applyCovPreview(_cover);
      toast('图片已压缩处理','ok');
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

    notes: document.getElementById('f-notes')?.value?.trim()||'',
    cover: _cover,
    links: _links.filter(l=>l.url),
    tags: [..._tags],
    status,
    rating: _rating,
    createdAt: editId ? (store.items.find(i=>i.id===editId)?.createdAt||new Date().toISOString()) : new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    local: isConnected() ? false : true
  };
  // preserve local flag if editing
  if(editId && wasLocal !== null) item.local = wasLocal;

  if(editId) {
    const idx=store.items.findIndex(i=>i.id===editId);
    if(idx>-1) store.items[idx]=item;
  } else {
    store.items.unshift(item);
  }
  save();
  closeM('add-modal');
  updateCounts();
  renderContent();
  toast(editId?'已更新':'已添加','ok');
  if(isConnected() && store.settings.autoSync) {
    await syncToGithub(true);
  } else if(isConnected() && !store.settings.autoSync) {
    // do nothing, user manually syncs
  }
}

async function deleteItem(id) {
  const item = store.items.find(i=>i.id===id);
  if(!item) return;
  // Check for uploaded file links
  const fileLinks = (item.links||[]).filter(l=>l.type==='file'&&l.url);
  let deleteFiles = false;
  if(fileLinks.length>0 && isConnected()) {
    const msg = `确认删除「${item.title}」？\n\n` +
      `⚠️ 该记录包含 ${fileLinks.length} 个上传文件：\n` +
      fileLinks.map(l=>`• ${l.name||l.filename||'文件'}`).join('\n') +
      '\n\n是否同时从 GitHub 删除这些文件？\n' +
      '⚠️ 此操作不可撤回！请确认没有其他记录或他人链接使用这些文件。\n\n' +
      '确定 = 删除记录+文件 | 取消 = 仅删除记录，保留文件';
    deleteFiles = confirm(msg);
  } else {
    if(!confirm(`确认删除「${item.title||'此记录'}」？`)) return;
  }
  // Delete files if requested
  if(deleteFiles) {
    for(const link of fileLinks) {
      await deleteGithubFile(link.url, link.filename);
    }
  }
  store.items = store.items.filter(i=>i.id!==id);
  save(); updateCounts(); closeM('det-modal'); renderContent();
  toast('已删除','ok');
  if(isConnected()) await syncToGithub(true);
}

async function syncToGithub(silent=false) {
  const {githubToken:tk,githubRepo:repo,githubPath:path} = store.settings;
  if(!tk||!repo) return false;
  const dot=document.getElementById('gh-dot');
  if(dot) dot.className='gh-dot syncing';
  try {
    let sha=null;
    const getR=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}
    });
    if(getR.ok){const d=await getR.json();sha=d.sha;}
    else if(getR.status===401||getR.status===403){
      if(dot) dot.className='gh-dot error';
      toast('推送失败：Token 无效或无权限，请检查 Token 是否正确','err');
      return false;
    }
    // Only upload items without base64 covers (or compress if needed)
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(store.items,null,2))));
    const body={message:`Update ${new Date().toISOString()}`,content,...(sha?{sha}:{})};
    const putR=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(putR.ok){
      if(dot) dot.className='gh-dot connected';
      if(!silent) toast('已同步到 GitHub ✅','ok');
      return true;
    } else {
      const err=await putR.json();
      if(dot) dot.className='gh-dot error';
      const msg = err.message||'未知错误';
      if(msg.includes('not accessible')) toast('推送失败：Token 权限不足，请确认已开启 repo 读写权限','err');
      else toast(`推送失败：${msg}`,'err');
      return false;
    }
  } catch(e) {
    if(dot) dot.className='gh-dot error';
    if(!silent) toast(`网络错误：${e.message}`,'err');
    return false;
  }
}

async function uploadImageToGithub(base64data, filename) {
  const {githubToken:tk,githubRepo:repo,imgFolder} = store.settings;
  if(!tk||!repo) return null;
  const folder = imgFolder||'img';
  const path = `${folder}/${filename}`;
  // Remove data URL prefix
  const content = base64data.split(',')[1]||base64data;
  try {
    let sha=null;
    const getR=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}
    });
    if(getR.ok){const d=await getR.json();sha=d.sha;}
    const body={message:`Upload image ${filename}`,content,...(sha?{sha}:{})};
    const putR=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(putR.ok){
      const d=await putR.json();
      return d.content?.download_url||`https://raw.githubusercontent.com/${repo}/main/${path}`;
    }
    return null;
  } catch(e){ return null; }
}

async function syncFromGithub() {
  const {githubToken:tk,githubRepo:repo,githubPath:path} = store.settings;
  if(!tk||!repo){toast('请先配置 GitHub 设置','err');return;}
  const dot=document.getElementById('gh-dot');
  if(dot) dot.className='gh-dot syncing';
  try {
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}
    });
    if(!r.ok){
      if(dot) dot.className='gh-dot error';
      if(r.status===401||r.status===403) toast('拉取失败：Token 无效，请检查 Token','err');
      else toast('拉取失败，文件可能不存在','err');
      return;
    }
    const d=await r.json();
    const json=decodeURIComponent(escape(atob(d.content)));
    const items=JSON.parse(json);
    if(dot) dot.className='gh-dot connected';
    return items;
  } catch(e){
    if(dot) dot.className='gh-dot error';
    toast(`错误：${e.message}`,'err');
    return null;
  }
}

window._mergeUpload = async function(){
  const remote = window._remoteItems||[];
  // Merge: remote as base, add local items that don't conflict
  const merged = [...remote];
  store.items.filter(i=>i.local).forEach(li=>{
    if(!merged.find(r=>r.id===li.id)){
      li.local=false; merged.unshift(li);
    }
  });
  store.items = merged;
  save(); updateCounts(); closeM('connect-modal');
  await syncToGithub(false);
  renderContent();
};
window._keepBoth = function(){
  const remote = window._remoteItems||[];
  const localOnly = store.items.filter(i=>i.local);
  store.items = [...localOnly, ...remote.filter(r=>!store.items.find(l=>l.id===r.id))];
  save(); updateCounts(); closeM('connect-modal'); renderContent();
  toast(`已合并，共 ${store.items.length} 条记录`,'ok');
};
window._exportThenPull = function(){
  doExport('all');
  const remote = window._remoteItems||[];
  store.items = remote;
  save(); updateCounts(); closeM('connect-modal'); renderContent();
  toast('已导出本地数据并加载 GitHub 记录','ok');
};

function confirmImport(){
  const items=window._importItems||[];
  const mode=document.querySelector('input[name="impmode"]:checked')?.value||'merge';
  const selectedCats=[...document.querySelectorAll('.imp-cat-cb:checked')].map(i=>i.value);

  let filtered=items.filter(i=>selectedCats.includes(i.category||'other'));
  // remap categories
  filtered=filtered.map(it=>{
    const origCat=it.category||'other';
    const remapEl=document.getElementById(`imp-remap-${origCat}`);
    const newCat=remapEl?remapEl.value:origCat;
    return {...it,category:newCat,id:it.id||uid()};
  });

  if(mode==='space'){
    const name=document.getElementById('imp-space-name')?.value?.trim()||`导入空间 ${store.spaces.length+1}`;
    const space={id:uid(),name,items:filtered,createdAt:new Date().toISOString()};
    store.spaces.push(space);
    save();closeM('imp-modal');renderSpaceNav();
    toast(`已创建独立空间"${name}"，${filtered.length} 条记录`,'ok');
    return;
  }

  let added=0,updated=0;
  filtered.forEach(it=>{
    const idx=store.items.findIndex(x=>x.id===it.id);
    if(idx>-1){if(mode==='overwrite'){store.items[idx]=it;updated++;}}
    else{store.items.push(it);added++;}
  });
  save();updateCounts();closeM('imp-modal');renderContent();
  toast(`导入完成：新增 ${added}，更新 ${updated}`,'ok');
}

// Render custom category nav items in sidebar
function renderCustomCatNav(){
  const el = document.getElementById('custom-cat-nav');
  if(!el) return;
  const custom = store.settings.customCats || {};
  const items = Object.entries(custom);
  if(!items.length){ el.innerHTML=''; return; }
  el.innerHTML = items.map(([k,v])=>`
    <button class="nav-item${page===k&&!currentSpace?' active':''}" data-page="${k}" onclick="navigateTo('${k}')">
      <span class="ni">${v.icon||'📁'}</span>${eh(v.label)}<span class="nc" id="cnt-${k}">${store.items.filter(i=>i.category===k).length}</span>
    </button>`).join('');
}

function renderSpaceNav(){
  const nav=document.getElementById('space-nav');
  if(!nav) return;
  if(!store.spaces.length){nav.innerHTML='';return;}
  let html=`<div class="nav-sec" style="margin-top:6px">导入空间</div>`;
  store.spaces.forEach(sp=>{
    html+=`<button class="nav-item space-nav-item${currentSpace===sp.id?' active':''}" data-space="${sp.id}" onclick="openSpace('${sp.id}')">
      <span class="ni">📦</span>${eh(sp.name)}<span class="nc">${sp.items.length}</span>
    </button>`;
    html+=`<button style="display:none" id="del-space-${sp.id}" onclick="deleteSpace('${sp.id}')"></button>`;
  });
  nav.innerHTML=html;
}

function openSpace(id){
  currentSpace=id;
  const sp=store.spaces.find(s=>s.id===id);
  if(!sp) return;
  page='books';
  navigateTo('books',id);
  renderSpaceNav();
}

function renderSpacePage(){
  const sp=store.spaces.find(s=>s.id===currentSpace);
  if(!sp) return '<div class="empty"><div class="empty-i">❌</div><div>空间不存在</div></div>';
  const cats=Object.entries(getAllCats());
  const items=sp.items.filter(i=>i.category===page);
  const catNav=cats.map(([k,v])=>`
    <button class="ftag${page===k?' on':''}" onclick="spaceCatNav('${k}')">${v.icon} ${v.label} (${sp.items.filter(i=>i.category===k).length})</button>`).join('');
  const subItems=getFilteredItems();
  let html=`<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <span style="font-size:13px;color:var(--tx3)">📦 ${eh(sp.name)}</span>
    <button class="btn sm danger" onclick="deleteSpace('${sp.id}')">🗑️ 删除此空间</button>
    <button class="btn sm" onclick="exitSpace()">← 返回</button>
  </div>
  <div class="filter-row">${catNav}</div>
  <div class="filter-row">`;
  STATUS_OPTS.forEach(s=>{html+=`<button class="ftag${filters.status.includes(s.id)?' on':''}" onclick="toggleStatusFilter('${s.id}')">${s.label}</button>`;});
  html+=`</div>`;
  html+=renderViewCtrl(subItems.length);
  html+=subItems.length?renderItems(subItems):renderEmpty();
  return html;
}

function spaceCatNav(c){page=c;renderContent();}
function exitSpace(){currentSpace=null;navigateTo('books');}
function deleteSpace(id){
  if(!confirm('确认删除此空间？')) return;
  store.spaces=store.spaces.filter(s=>s.id!==id);
  save();exitSpace();renderSpaceNav();
  toast('空间已删除','ok');
}

async function handleFileUpload(e){
  const f=e.target.files[0];if(!f) return;
  toast('上传中...','info');
  const r=new FileReader();
  r.onload=async ev=>{
    const b64=ev.target.result.split(',')[1];
    const {githubToken:tk,githubRepo:repo}=store.settings;
    const path=`assets/doc/${f.name}`;
    try{
      let sha=null;
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;}
      const body={message:`Upload ${f.name}`,content:b64,...(sha?{sha}:{})};
      const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      if(pr.ok){toast(`${f.name} 上传成功 ✅`,'ok');loadFileList();}
      else toast('上传失败','err');
    }catch(err){toast(`错误：${err.message}`,'err');}
  };
  r.readAsDataURL(f);
}

async function fmUploadFile(e){
  const f=e.target.files[0];if(!f)return;
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  const folder=(assetFolder||'assets/doc').replace(/\/$/,'');
  toast('上传中...','info');
  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result.split(',')[1];
    const path=`${folder}/${f.name}`;
    try{
      let sha=null;
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;}
      const body={message:`Upload ${f.name}`,content:b64,...(sha?{sha}:{})};
      const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      if(pr.ok){toast(`${f.name} 已上传`,'ok');loadFmList();}
      else toast('上传失败','err');
    }catch(err){toast(`错误：${err.message}`,'err');}
  };
  reader.readAsDataURL(f);
  e.target.value='';
}

async function fmDeleteFile(path,sha,name){
  const {githubToken:tk,githubRepo:repo}=store.settings;
  if(!confirm(`⚠️ 确认从 GitHub 永久删除文件「${name}」？\n\n此操作不可撤回！请确认：\n• 没有其他项目共用此文件链接\n• 此链接未曾单独分享给他人`)) return;
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'DELETE',
      headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Delete ${name}`,sha})
    });
    if(r.ok){toast(`${name} 已删除`,'ok');loadFmList();}
    else toast('删除失败','err');
  }catch(e){toast(`错误：${e.message}`,'err');}
}

async function loadFmList(){
  const {githubToken:tk,githubRepo:repo}=store.settings;
  if(!tk||!repo) return;
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  if(!tk||!repo) return;
  const folder=(assetFolder||'assets/doc').replace(/\/$/,'');
  const el=document.getElementById('fm-list')||document.getElementById('file-list');
  if(!el) return;
  el.innerHTML='<div style="color:var(--tx3);font-size:13px;text-align:center;padding:20px">加载中...</div>';
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(!r.ok){el.innerHTML='<div style="color:var(--tx3);font-size:13px;text-align:center;padding:20px">文件夹不存在或为空</div>';return;}
    const files=await r.json();
    if(!files.length){el.innerHTML='<div style="color:var(--tx3);font-size:13px;text-align:center;padding:20px">暂无文件</div>';return;}
    el.innerHTML=`<div style="display:flex;flex-direction:column;gap:7px">${files.map(f=>`
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r)">
        <span style="font-size:18px">📄</span>
        <span style="flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${eh(f.name)}</span>
        <span style="font-size:11px;color:var(--tx3);flex-shrink:0">${(f.size/1024).toFixed(1)} KB</span>
        <a href="${f.download_url}" target="_blank" class="btn sm" style="flex-shrink:0;padding:3px 8px">⬇️</a>
        <button class="btn sm" onclick="copyToClipboard('${f.download_url}')" style="flex-shrink:0;padding:3px 8px">📋</button>
        <button class="btn sm" onclick="showQRCode('${f.download_url}','${eh(f.name)}')" style="flex-shrink:0;padding:3px 8px">📱</button>
        <button class="btn sm danger" onclick="fmDeleteFile('${f.path}','${f.sha}','${eh(f.name)}')" style="flex-shrink:0;padding:3px 8px">🗑️</button>
      </div>`).join('')}</div>`;
  }catch(e){el.innerHTML=`<div style="color:var(--red);font-size:13px;text-align:center;padding:20px">加载失败：${e.message}</div>`;}
}

function renderStats(){
  const all=store.items;
  const total=all.length;
  const watched=all.filter(i=>i.status==='watched').length;
  const watching=all.filter(i=>i.status==='watching').length;
  const rated=all.filter(i=>i.rating);
  const avgR=rated.length?(rated.reduce((s,i)=>s+i.rating,0)/rated.length).toFixed(1):'-';

  const catCards=Object.entries(CATS).map(([k,v])=>{
    const ci=all.filter(i=>i.category===k);
    const cr=ci.filter(i=>i.rating);
    const ar=cr.length?(cr.reduce((s,i)=>s+i.rating,0)/cr.length).toFixed(1):'-';
    return `<div class="scard"><div class="sv">${ci.length}</div><div class="sl">${v.icon} ${v.label}</div><div style="font-size:11px;color:var(--amber);margin-top:2px">⭐ ${ar}</div></div>`;
  }).join('');

  // top tags
  const tagCount={};
  all.forEach(i=>(i.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));
  const topTags=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  const recent=[...all].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);

  return `<div>
    <div style="font-family:var(--fs);font-size:20px;font-weight:600;margin-bottom:14px">📊 统计概览</div>
    <div class="stats-mini">
      <div class="scard"><div class="sv">${total}</div><div class="sl">总收藏</div></div>
      <div class="scard"><div class="sv">${watched}</div><div class="sl">✅ 已看</div></div>
      <div class="scard"><div class="sv">${watching}</div><div class="sl">👁️ 在看</div></div>
      <div class="scard"><div class="sv">${avgR}</div><div class="sl">⭐ 平均分</div></div>
      ${catCards}
    </div>
    ${topTags.length?`<div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">🏷️ 最多标签 Top 3</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${topTags.map(([t,n],i)=>`<span class="tchip" style="font-size:12px;padding:4px 12px">${['🥇','🥈','🥉'][i]} ${eh(t)} <span style="font-family:var(--fm);color:var(--ac)">${n}</span></span>`).join('')}
      </div>
    </div>`:''}
    <div style="font-family:var(--fs);font-size:17px;font-weight:600;margin-bottom:12px">🕐 最近添加</div>
    ${renderViewCtrl(recent.length)}
    ${recent.length?renderItems(recent):renderEmpty()}
  </div>`;
}

function saveGhSettings(){
  const tk=document.getElementById('gh-token')?.value?.trim()||'';
  const repo=document.getElementById('gh-repo')?.value?.trim()||'';
  const path=document.getElementById('gh-path')?.value?.trim()||'collection.json';
  const img=document.getElementById('gh-img')?.value?.trim()||'img';
  const wasConnected=isConnected();

  store.settings.githubToken=tk;

async function pullFromGh(){
  const items=await syncFromGithub();
  if(!items) return;
  const localOnly=store.items.filter(i=>i.local);
  if(localOnly.length>0){
    if(!confirm(`你有 ${localOnly.length} 条本地记录，拉取将覆盖非本地数据。确认继续？`)) return;
  }
  store.items=[...localOnly,...items.filter(r=>!localOnly.find(l=>l.id===r.id))];
  save();updateCounts();renderContent();
  toast(`已拉取 ${items.length} 条记录`,'ok');
}

const BUILT_IN_CATS = Object.keys(CATS); // fixed at load time
function renderCustomCatsList(){
  return (store.settings.customCats||[]).map(c=>`
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg3);border-radius:var(--rs);font-size:12.5px">
      ${eh(c.icon)} ${eh(c.label)}

    </div>`).join('');
}
function addCustomCat(){
  const key=(document.getElementById('custom-cat-key')?.value||'').trim().replace(/\s+/g,'_').toLowerCase();
  const label=(document.getElementById('custom-cat-label')?.value||'').trim();
  const icon=(document.getElementById('custom-cat-icon')?.value||'').trim()||'📁';
  const type=document.getElementById('custom-cat-type')?.value||'media';
  if(!key||!label){toast('请填写ID和名称','err');return;}
  if(BUILT_IN_CATS.includes(key)||CATS[key]){toast('该ID已存在','err');return;}
  if(!store.settings.customCats) store.settings.customCats=[];
  if(store.settings.customCats.find(c=>c.key===key)){toast('该ID已存在','err');return;}
  store.settings.customCats.push({key,label,icon,type});
  // Inject into CATS
  CATS[key]={label,icon,type};
  // Add nav item
  addCatNavItem(key,label,icon);
  save();
  document.getElementById('custom-cat-key').value='';
  document.getElementById('custom-cat-label').value='';
  document.getElementById('custom-cat-icon').value='';
  const el=document.getElementById('custom-cats-list');
  if(el) el.innerHTML=renderCustomCatsList();
  toast(`已添加分类"${label}"`,'ok');
}
function removeCustomCat(key){
  if(!confirm(`确认删除分类"${CATS[key]?.label||key}"？该分类下的记录不会被删除，但不再显示在分类中。`)) return;
  store.settings.customCats=(store.settings.customCats||[]).filter(c=>c.key!==key);
  delete CATS[key];
  save();
  renderSpaceNav();
  // Remove nav item
  const el=document.querySelector(`.nav-item[data-page="${key}"]`);
  if(el) el.remove();
  const el2=document.getElementById(`cnt-${key}`);
  // Re-render sidebar nav section
  renderSidebarCats();
  const el3=document.getElementById('custom-cats-list');
  if(el3) el3.innerHTML=renderCustomCatsList();
  toast('分类已删除','ok');
}
function addCatNavItem(key,label,icon){
  // Will be picked up by renderSidebarCats
  renderSidebarCats();
}
function renderSidebarCats(){
  // Re-render the category nav items dynamically
  const nav=document.getElementById('sidebar-cats-nav');
  if(!nav) return;
  nav.innerHTML=Object.entries(CATS).map(([k,v])=>`
    <button class="nav-item${page===k&&!currentSpace?' active':''}" data-page="${k}" onclick="navigateTo('${k}')">
      <span class="ni">${v.icon}</span>${eh(v.label)}<span class="nc" id="cnt-${k}">${store.items.filter(i=>i.category===k).length}</span>
    </button>`).join('');
}

function toast(msg,type='ok'){
  const c=document.getElementById('toasts');
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span>${eh(msg)}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);
}

// Aliases for compatibility
const getSVGLogoDataURL = getLogoDataUrl;
function getSVGLogoInline(){ return DEFAULT_LOGO_SVG; }
const initFavicon = applyLogoToDOM;

function applyLogoToDOM(){
  const logoUrl=getLogoDataUrl();
  const fav=document.getElementById('site-favicon');
  const atIcon=document.getElementById('apple-touch-icon');
  const logoImg=document.getElementById('site-logo-img');
  const test=new Image();
  test.onload=()=>{};
  test.onerror=()=>{
    if(fav) fav.href=logoUrl;
    if(atIcon) atIcon.href=logoUrl;
    if(logoImg) logoImg.src=logoUrl;
  };
  test.src='img/logo.ico';
}

function setupPWA(){
  const logoUrl=getLogoDataUrl();
  const manifest={name:SITE_CONFIG.title||'藏·索引',short_name:'藏索引',start_url:'.',display:'standalone',background_color:'#f6f3ee',theme_color:'#c8773a',icons:[{src:logoUrl,sizes:'192x192',type:'image/svg+xml'},{src:logoUrl,sizes:'512x512',type:'image/svg+xml'},{src:'img/logo.ico',sizes:'any',type:'image/x-icon'}]};
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);
  }catch(e){}
  applyLogoToDOM();
  if('serviceWorker' in navigator){
    try{
      const sw=`self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
      const swBlob=new Blob([sw],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    }catch(e){}
  }
}

function eh(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s){ if(!s)return''; return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function esc(s){ if(!s)return''; return String(s).replace(/`/g,'\\`').replace(/\$/g,'\\$'); }
