<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#c8773a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="藏·索引">
<title>藏·索引</title>
<link rel="manifest" id="pwa-manifest">
<link rel="icon" id="favicon" type="image/x-icon">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   藏·索引 v6 — Design System
═══════════════════════════════════════════════════════ */
:root{
  --bg:#f6f3ee;--bg2:#edeae3;--bg3:#e0ddd5;
  --sur:#fff;--sur2:#f2efe8;
  --bd:#d3cec4;--bd2:#c4bfb5;
  --tx:#1a1714;--tx2:#57524d;--tx3:#8c8680;
  --ac:#c8773a;--ac2:#a0601e;--acl:#f5e4d2;--acl2:#fdf0e5;
  --red:#ef4444;--redd:#fee2e2;
  --green:#22c55e;--greend:#dcfce7;
  --amber:#f59e0b;--ambd:#fef3c7;
  --blue:#3b82f6;--blued:#dbeafe;
  --purple:#8b5cf6;--purpd:#ede9fe;
  --sh:0 1px 8px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --shl:0 8px 32px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.08);
  --r:12px;--rs:8px;--rl:20px;--rxl:28px;
  --tr:.2s cubic-bezier(.4,0,.2,1);
  --fs:'Noto Serif SC',serif;
  --fn:'Noto Sans SC',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --sw:236px;
}
[data-dark]{
  --bg:#0d0c0b;--bg2:#141312;--bg3:#1c1b19;
  --sur:#181715;--sur2:#1f1e1c;
  --bd:#2a2825;--bd2:#363330;
  --tx:#eee9e2;--tx2:#9a9490;--tx3:#6a6460;
  --ac:#e89248;--ac2:#c8721e;--acl:#251807;--acl2:#1e1408;
  --redd:#3f1010;--greend:#0f2e18;--ambd:#2d1e04;--blued:#0d1f3e;--purpd:#1e1238;
  --sh:0 1px 8px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.2);
  --shm:0 4px 16px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.25);
  --shl:0 8px 32px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;height:100%}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;line-height:1.5;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
button{font-family:var(--fn);cursor:pointer;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
input,select,textarea{font-family:var(--fn)}

/* ── LAYOUT ─────────────────────────────────────────── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar{
  width:var(--sw);background:var(--bg2);border-right:1px solid var(--bd);
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  transition:transform var(--tr),background var(--tr);
}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;overflow:hidden}
.sb-logo-text .site-title{font-family:var(--fs);font-size:17px;font-weight:700;color:var(--ac);letter-spacing:.04em}
.sb-logo-text .site-ver{font-family:var(--fm);font-size:9px;color:var(--tx3);padding:1px 5px;border:1px solid var(--bd);border-radius:4px;display:inline-block;margin-top:1px}
.sb-logo-sub{font-size:9.5px;color:var(--tx3);margin-top:5px;font-family:var(--fm);letter-spacing:.06em}
.gh-pill{display:flex;align-items:center;gap:6px;margin:9px 14px 0;padding:6px 10px;border-radius:var(--rs);font-size:11px;font-family:var(--fm);border:1px solid var(--bd);background:var(--sur);cursor:pointer;transition:all var(--tr);min-width:0}
.gh-pill:hover{border-color:var(--ac)}
.gh-pill span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.gh-dot{width:7px;height:7px;border-radius:50%;background:var(--bd);flex-shrink:0;transition:background var(--tr)}
.gh-dot.ok{background:var(--green)}
.gh-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.gh-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-nav{padding:8px 0;flex:1}
.sb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--tx3);padding:8px 16px 3px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 16px;border:none;background:none;width:100%;text-align:left;font-size:13px;color:var(--tx2);cursor:pointer;position:relative;transition:background var(--tr),color var(--tr)}
.nav-btn:hover{background:var(--bg3);color:var(--tx)}
.nav-btn.active{background:var(--acl);color:var(--ac);font-weight:600}
.nav-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
.nav-btn .ni{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.nav-btn .nc{margin-left:auto;font-size:10px;font-family:var(--fm);background:var(--bg3);color:var(--tx3);border-radius:9px;padding:1px 6px;flex-shrink:0}
.nav-btn.active .nc{background:var(--acl);color:var(--ac)}
.sb-foot{padding:10px 10px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px}
.sbf-btn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);border:1px solid var(--bd);background:var(--sur);transition:all var(--tr);width:100%;text-align:left}
.sbf-btn:hover{background:var(--bg3);color:var(--tx);border-color:var(--bd2)}

/* ── MAIN ─────────────────────────────────────────── */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ─────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:90;
  background:rgba(246,243,238,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
  padding:10px 22px;display:flex;align-items:center;gap:11px;
}
[data-dark] .topbar{background:rgba(13,12,11,.92)}
.topbar-title{font-family:var(--fs);font-size:17px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--rs);padding:5px 10px;flex:1;max-width:260px;transition:all var(--tr)}
.search-box:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.search-box input{border:none;background:transparent;font-size:12.5px;color:var(--tx);outline:none;width:100%;min-width:0}
.search-box input::placeholder{color:var(--tx3)}
.search-clear{background:none;border:none;color:var(--tx3);font-size:15px;cursor:pointer;padding:0;line-height:1;display:none;flex-shrink:0}
.ibtn{width:33px;height:33px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2);transition:all var(--tr);flex-shrink:0}
.ibtn:hover{background:var(--bg3);color:var(--tx)}
.ibtn.on{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* ── BANNER ─────────────────────────────────────────── */
.banner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:13px 22px 0;padding:11px 15px;background:var(--acl2);border:1px solid var(--ac);border-radius:var(--r);font-size:13px;color:var(--tx2)}
.gbtn{padding:5px 12px;border-radius:var(--rs);font-size:12px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);transition:all var(--tr);flex-shrink:0;white-space:nowrap}
.gbtn:hover{border-color:var(--ac);color:var(--ac)}
.gbtn.p{background:var(--ac);color:#fff;border-color:var(--ac)}
.gbtn.p:hover{background:var(--ac2)}

/* ── CONTENT ─────────────────────────────────────────── */
.content{padding:18px 22px 40px;flex:1}

/* ── FILTER BAR ─────────────────────────────────────── */
.fbar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ftag{padding:4px 10px;border-radius:18px;font-size:11.5px;border:1px solid var(--bd);background:var(--sur);color:var(--tx2);transition:all var(--tr);white-space:nowrap;cursor:pointer}
.ftag:hover{border-color:var(--ac);color:var(--ac)}
.ftag.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.ftag.local{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── VIEW CONTROLS ─────────────────────────────────── */
.vctrl{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.vsel{padding:5px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur);color:var(--tx);font-size:12px;outline:none;cursor:pointer;transition:border var(--tr)}
.vsel:focus{border-color:var(--ac)}
.vcnt{font-size:11.5px;color:var(--tx3);font-family:var(--fm);flex:1}
.vbtns{display:flex;gap:3px}
.vbtn{width:30px;height:30px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx3);transition:all var(--tr);cursor:pointer}
.vbtn:hover{color:var(--tx)}
.vbtn.on{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* ── GRID VIEW ─────────────────────────────────────── */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;animation:fadeIn .2s}
.grid-card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:all var(--tr);position:relative}
.grid-card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.grid-card.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--acl)}
.g-cov{width:100%;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.g-cov img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.g-cov .nc-icon{font-size:36px;opacity:.35}
.grid-card:hover .g-cov img{transform:scale(1.05)}
.g-info{padding:9px 10px}
.g-title{font-size:12.5px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.g-meta{font-size:11px;color:var(--tx3)}

/* ── LIST VIEW ─────────────────────────────────────── */
.list-view{display:flex;flex-direction:column;gap:8px;animation:fadeIn .2s}
.list-card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);display:flex;gap:13px;padding:12px;cursor:pointer;transition:all var(--tr);position:relative;align-items:flex-start}
.list-card:hover{box-shadow:var(--sh);transform:translateX(3px)}
.list-card.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--acl)}
.l-cov{width:62px;aspect-ratio:2/3;border-radius:var(--rs);background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.l-cov img{width:100%;height:100%;object-fit:cover;}
.l-info{flex:1;min-width:0}
.l-title{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.4}
.l-meta{font-size:11.5px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px}
.l-desc{font-size:12.5px;color:var(--tx2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.l-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}

/* ── COMPACT VIEW ───────────────────────────────────── */
.compact-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:7px;animation:fadeIn .2s}
.cmp-card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bd);display:flex;gap:10px;padding:9px;cursor:pointer;transition:all var(--tr);align-items:center;position:relative}
.cmp-card:hover{box-shadow:var(--sh);border-color:var(--ac)}
.cmp-card.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--acl)}
.c-cov{width:44px;aspect-ratio:2/3;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
.c-cov img{width:100%;height:100%;object-fit:cover;}
.c-info{flex:1;min-width:0}
.c-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-meta{font-size:11px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── STATUS BADGE ───────────────────────────────────── */
.sbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;line-height:1.4}
.sbadge.watched{background:var(--green);color:#fff}
.sbadge.watching{background:var(--amber);color:#fff}
.sbadge.unwatched{background:rgba(90,85,80,.7);color:#fff;backdrop-filter:blur(2px)}
.sbadge.local{background:var(--blue);color:#fff}
.sbadge.custom-s{background:var(--purple);color:#fff}
.cover-badge{position:absolute;top:7px;right:7px;z-index:1}
.cover-badge .sbadge{box-shadow:0 1px 5px rgba(0,0,0,.45)}

/* ── CHECKBOX ───────────────────────────────────────── */
.cbox{position:absolute;top:7px;left:7px;width:19px;height:19px;border-radius:5px;border:2px solid var(--bd);background:var(--sur);display:none;align-items:center;justify-content:center;z-index:2;transition:all var(--tr);font-size:11px}
.select-mode .cbox{display:flex}
.cbox.ck{background:var(--ac);border-color:var(--ac);color:#fff}

/* ── TAG CHIP ───────────────────────────────────────── */
.tchip{font-size:11px;padding:2px 7px;border-radius:9px;background:var(--bg3);color:var(--tx2);border:none;transition:all var(--tr);display:inline-flex;align-items:center;gap:3px}
/* Cover placeholder icon opacity (NOT applied to img) */
.l-cov>.nc-icon,.c-cov>.nc-icon,.det-cover>.nc-icon,.g-cov>.nc-icon{opacity:.38}
.tchip:hover{background:var(--acl);color:var(--ac);cursor:pointer}

/* ── SELECT BAR ─────────────────────────────────────── */
.sel-bar{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:8px 16px;box-shadow:var(--shl);gap:8px;align-items:center;z-index:200;animation:slideUp .22s;flex-wrap:wrap;max-width:90vw;justify-content:center}
.sel-bar.show{display:flex}
.sel-cnt{font-size:13px;font-weight:700;color:var(--ac);font-family:var(--fm)}
.sact{padding:5px 12px;border-radius:18px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx);font-size:12px;transition:all var(--tr)}
.sact:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.sact.danger:hover{background:var(--red);border-color:var(--red);color:#fff}
.sact.danger{color:var(--red)}

/* ── MODAL ──────────────────────────────────────────── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadeIn .18s}
.modal{background:var(--sur);border-radius:var(--rl);width:100%;max-height:93vh;overflow-y:auto;box-shadow:var(--shl);animation:slideUp .26s cubic-bezier(.4,0,.2,1);border:1px solid var(--bd)}
.mhd{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--sur);z-index:10;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.mtt{font-family:var(--fs);font-size:17px;font-weight:600}
.mclose{width:29px;height:29px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--tx2);transition:all var(--tr);flex-shrink:0}
.mclose:hover{background:var(--bg3);color:var(--tx)}
.mbody{padding:18px 22px 24px}
.mfoot{padding:13px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:var(--sur)}

/* ── FORM ───────────────────────────────────────────── */
.fg{margin-bottom:14px}
.fg:last-child{margin-bottom:0}
.fl{display:flex;align-items:baseline;gap:6px;margin-bottom:5px}
.fl-label{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em}
.fl-note{font-size:10.5px;color:var(--tx3);font-weight:400;text-transform:none;letter-spacing:0}
.fi{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:13.5px;outline:none;transition:all var(--tr)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
textarea.fi{resize:vertical;min-height:68px;line-height:1.6}
select.fi{cursor:pointer}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fhint{font-size:11px;color:var(--tx3);margin-top:3px;line-height:1.5}
.fdiv{height:1px;background:var(--bd);margin:16px 0}

/* ── COVER UPLOAD ───────────────────────────────────── */
.cov-wrap{border:2px dashed var(--bd);border-radius:var(--r);cursor:pointer;transition:all var(--tr);background:var(--bg);overflow:hidden;min-height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.cov-wrap:hover{border-color:var(--ac);background:var(--acl2)}
.cov-wrap.has{border-style:solid;border-color:var(--bd2);padding:0}
.cov-ph{text-align:center;padding:16px;color:var(--tx3);font-size:12.5px;pointer-events:none}
.cov-ph .cpi{font-size:26px;margin-bottom:5px}
.cov-prev{width:100%;max-height:180px;object-fit:cover;display:none}
.cov-wrap.has .cov-ph{display:none}
.cov-wrap.has .cov-prev{display:block}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx);transition:all var(--tr);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.p{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.p:hover:not(:disabled){background:var(--ac2);border-color:var(--ac2)}
.btn.d{color:var(--red);border-color:var(--red)}
.btn.d:hover:not(:disabled){background:var(--red);color:#fff}
.btn.b{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.b:hover{opacity:.85}
.btn.sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* ── LINK ROWS ──────────────────────────────────────── */
.ll{display:flex;flex-direction:column;gap:8px}
.ll-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px}
.ll-head{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.ll-body{display:flex;flex-direction:column;gap:6px}
.ll-acts{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.lrm{width:28px;height:28px;border-radius:var(--rs);border:1px solid var(--redd);background:var(--redd);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:15px;transition:all var(--tr);flex-shrink:0;cursor:pointer}
.lrm:hover{background:var(--red);color:#fff;border-color:var(--red)}
.add-link-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border:1px dashed var(--bd);border-radius:var(--rs);background:transparent;color:var(--tx3);font-size:12px;transition:all var(--tr);cursor:pointer;margin-top:4px}
.add-link-btn:hover{border-color:var(--ac);color:var(--ac)}

/* ── TAG SELECTOR ───────────────────────────────────── */
.tsel{display:flex;flex-wrap:wrap;gap:5px}
.tsec{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin:8px 0 4px;width:100%}
.topt{padding:3px 9px;border-radius:18px;font-size:12px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);transition:all var(--tr);cursor:pointer}
.topt:hover{border-color:var(--ac);color:var(--ac)}
.topt.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* ── STATUS PICKER ──────────────────────────────────── */
.sp-opts{display:flex;gap:6px;flex-wrap:wrap}
.sp-opt{padding:5px 13px;border-radius:18px;font-size:12px;border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);transition:all var(--tr);cursor:pointer}
.sp-opt.on.watched{background:var(--green);color:#fff;border-color:var(--green)}
.sp-opt.on.watching{background:var(--amber);color:#fff;border-color:var(--amber)}
.sp-opt.on.unwatched{background:rgba(90,85,80,.8);color:#fff;border-color:transparent}
.sp-opt.on.custom-s{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ── RATING ─────────────────────────────────────────── */
.stars{display:flex;gap:2px;align-items:center}
.star-w{position:relative;width:22px;height:22px;cursor:pointer;font-size:21px;line-height:22px;flex-shrink:0}
.star-w .sbg{color:var(--bd)}
.star-w .sfill{position:absolute;top:0;left:0;overflow:hidden;color:var(--amber);white-space:nowrap}
.star-w:hover .sbg{color:#fcd97a}
.slbl{font-size:12px;color:var(--tx3);font-family:var(--fm);margin-left:5px;min-width:32px}
.mini-stars{display:inline-flex;align-items:center;gap:0px;font-size:12px}

/* ── EPISODES SECTION ───────────────────────────────── */
.eps-section{margin-top:18px;border-top:1px solid var(--bd);padding-top:18px}
.eps-section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.eps-section-title h3{font-family:var(--fs);font-size:15px;font-weight:600;color:var(--tx)}
.eps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ep-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;position:relative}
.ep-card-head{display:flex;gap:12px;padding:12px}
.ep-thumb{width:56px;aspect-ratio:2/3;background:var(--bg3);border-radius:var(--rs);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.4}
.ep-thumb img{width:100%;height:100%;object-fit:cover;opacity:1}
.ep-meta{flex:1;min-width:0}
.ep-title{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-sub{font-size:11.5px;color:var(--tx3);margin-bottom:6px}
.ep-links{display:flex;flex-wrap:wrap;gap:4px}
.ep-link{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:11px;background:var(--acl);color:var(--ac);border:1px solid var(--ac);transition:all var(--tr)}
.ep-link:hover{background:var(--ac);color:#fff}

/* ── DETAIL MODAL ───────────────────────────────────── */
.det-layout{display:flex;gap:22px}
.det-left{flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.det-cover{width:120px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;}
.det-cover img{width:100%;height:100%;object-fit:cover;}
.det-right{flex:1;min-width:0}
.det-title{font-family:var(--fs);font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.3}
.det-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.det-metas{margin-bottom:12px}
.det-meta{font-size:12.5px;color:var(--tx2);margin-bottom:3px}
.det-meta strong{font-weight:500;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-right:5px}
.det-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.det-link{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:18px;font-size:12.5px;font-weight:500;border:1px solid var(--ac);background:var(--acl);color:var(--ac);transition:all var(--tr)}
.det-link:hover{background:var(--ac);color:#fff}
.det-link.file{border-color:var(--blue);background:var(--blued);color:var(--blue)}
.det-link.file:hover{background:var(--blue);color:#fff}
.det-sec{margin-top:18px}
.det-sec-t{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.mdc{font-size:13.5px;line-height:1.85;color:var(--tx2)}
.mdc p{margin-bottom:9px}
.mdc h1,.mdc h2,.mdc h3{color:var(--tx);font-family:var(--fs);margin:14px 0 6px}
.mdc code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:var(--fm);font-size:12px}
.mdc blockquote{border-left:3px solid var(--ac);padding-left:11px;color:var(--tx3);font-style:italic;margin:8px 0}
.mdc ul,.mdc ol{padding-left:18px}
.mdc li{margin-bottom:3px}
.mdc a{color:var(--ac)}
.mdc strong{color:var(--tx)}

/* ── EPISODES IN DETAIL ─────────────────────────────── */
.det-eps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:12px}
.det-ep-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;transition:all var(--tr)}
.det-ep-card:hover{border-color:var(--ac);box-shadow:var(--sh)}
.det-ep-head{display:flex;gap:10px;margin-bottom:8px}
.det-ep-cov{width:46px;aspect-ratio:2/3;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.det-ep-cov img{width:100%;height:100%;object-fit:cover;}
.det-ep-info{flex:1;min-width:0}
.det-ep-title{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-ep-sub{font-size:11px;color:var(--tx3);margin-bottom:5px}
.det-ep-links{display:flex;flex-wrap:wrap;gap:4px}
.det-ep-link{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:11px;border:1px solid var(--ac);background:var(--acl);color:var(--ac);transition:all var(--tr)}
.det-ep-link:hover{background:var(--ac);color:#fff}
.det-ep-link.file{border-color:var(--blue);background:var(--blued);color:var(--blue)}
.det-ep-link.file:hover{background:var(--blue);color:#fff}

/* ── EPISODE EDITOR ─────────────────────────────────── */
.ep-editor{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;position:relative}
.ep-editor-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ep-editor-num{font-size:12px;font-weight:700;color:var(--ac);font-family:var(--fm);background:var(--acl);padding:2px 8px;border-radius:6px}
.ep-editor-rm{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:6px;border:1px solid var(--redd);background:var(--redd);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all var(--tr)}
.ep-editor-rm:hover{background:var(--red);color:#fff}
.ep-cov-mini{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.ep-cov-thumb{width:50px;aspect-ratio:2/3;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.4;cursor:pointer;border:1px dashed var(--bd);transition:all var(--tr)}
.ep-cov-thumb:hover{border-color:var(--ac);background:var(--acl2)}
.ep-cov-thumb img{width:100%;height:100%;object-fit:cover;opacity:1}
.ep-cov-right{flex:1;min-width:0}

/* ── STATS ──────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;margin-bottom:16px}
.stat-c{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px}
.stat-v{font-size:22px;font-weight:700;font-family:var(--fm);color:var(--ac)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:2px}
.stat-r{font-size:11px;color:var(--amber);margin-top:1px}

/* ── SETTINGS ───────────────────────────────────────── */
.stg-sec{margin-bottom:22px}
.stg-tt{font-size:11.5px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:11px}
.stg-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd)}
.stg-row:last-child{border-bottom:none}
.stg-lbl{flex:1}
.stg-name{font-size:13.5px;font-weight:500}
.stg-desc{font-size:11.5px;color:var(--tx3);margin-top:1px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg3);position:relative;border:none;cursor:pointer;transition:background var(--tr);flex-shrink:0}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}
.stg-box{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:15px 16px}

/* ── FOLDER BROWSER ─────────────────────────────────── */
.fold-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;animation:fadeIn .2s}
.fold-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:15px 13px;cursor:pointer;transition:all var(--tr);position:relative;text-align:center}
.fold-card:hover{box-shadow:var(--shm);transform:translateY(-2px);border-color:var(--ac)}
.fold-card.sel-f{border-color:var(--ac);box-shadow:0 0 0 2px var(--acl);background:var(--acl2)}
.fold-card.builtin-f{border-left:3px solid var(--ac)}
.fold-icon{font-size:34px;margin-bottom:7px}
.fold-name{font-size:13px;font-weight:600;margin-bottom:3px}
.fold-cnt{font-size:11px;color:var(--tx3);font-family:var(--fm)}
.fold-stat{font-size:10px;color:var(--tx3);margin-top:3px;line-height:1.5}
.fold-cbox{position:absolute;top:7px;left:7px;width:18px;height:18px;border-radius:4px;border:2px solid var(--bd);background:var(--sur);display:none;align-items:center;justify-content:center;font-size:10px;z-index:2}
.fold-sel-mode .fold-cbox{display:flex}
.fold-cbox.ck{background:var(--ac);border-color:var(--ac);color:#fff}
.fold-list{display:flex;flex-direction:column;gap:7px;animation:fadeIn .2s}
.fold-row{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;gap:14px;padding:11px 14px;cursor:pointer;transition:all var(--tr);position:relative}
.fold-row:hover{box-shadow:var(--sh);transform:translateX(3px);border-color:var(--ac)}
.fold-row.sel-f{border-color:var(--ac);background:var(--acl2)}
.fold-row.builtin-f{border-left:3px solid var(--ac)}
.fold-row-icon{font-size:26px;flex-shrink:0}
.fold-row-info{flex:1;min-width:0}
.fold-row-name{font-size:13.5px;font-weight:600;margin-bottom:2px}
.fold-row-meta{font-size:11.5px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:7px}
.fold-act-bar{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:8px 16px;box-shadow:var(--shl);gap:8px;align-items:center;z-index:200;flex-wrap:wrap;max-width:92vw;justify-content:center}
.fold-act-bar.show{display:flex}

/* ── ABOUT ──────────────────────────────────────────── */
.about-hero{display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,var(--acl2),var(--sur2));border:1px solid var(--ac);border-radius:var(--rl);padding:22px 26px;margin-bottom:18px}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:10px}
.feat-c{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.feat-i{font-size:22px;margin-bottom:6px}
.feat-t{font-size:13px;font-weight:600;margin-bottom:3px}
.feat-d{font-size:11.5px;color:var(--tx3);line-height:1.6}

/* ── EMPTY ──────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;color:var(--tx3);text-align:center}
.empty-i{font-size:46px;margin-bottom:12px;opacity:.4}
.empty-t{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.empty-s{font-size:12px;line-height:1.7;max-width:240px}

/* ── FAB ────────────────────────────────────────────── */
.fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:var(--ac);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 18px rgba(200,119,58,.45);transition:all var(--tr);z-index:150;cursor:pointer}
.fab:hover{transform:scale(1.1) rotate(90deg);background:var(--ac2)}

/* ── TOASTS ─────────────────────────────────────────── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;font-size:12.5px;box-shadow:var(--shl);display:flex;align-items:center;gap:8px;pointer-events:auto;animation:slideInR .22s;max-width:290px}
.toast.ok{border-color:#22c55e55}
.toast.err{border-color:#ef444455}
.toast.info{border-color:#3b82f655}

/* ── FILE MANAGER ───────────────────────────────────── */
.fm-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);transition:all var(--tr)}
.fm-item:hover{border-color:var(--bd2)}
.fm-name{flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.fm-size{font-size:11px;color:var(--tx3);flex-shrink:0;font-family:var(--fm)}

/* ── MARKDOWN EDITOR ───────────────────────────────── */
.md-wrap{border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;background:var(--bg);transition:border var(--tr)}
.md-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.md-bar{display:flex;flex-wrap:wrap;gap:1px;padding:5px 6px;background:var(--bg2);border-bottom:1px solid var(--bd)}
.md-btn{width:26px;height:26px;border-radius:5px;border:none;background:transparent;color:var(--tx2);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--tr);font-weight:600;flex-shrink:0;padding:0}
.md-btn:hover{background:var(--sur);color:var(--ac)}
.md-sep{width:1px;background:var(--bd);margin:3px 2px;flex-shrink:0}
.md-wrap textarea{border:none;background:transparent;padding:8px 11px;width:100%;font-size:13.5px;line-height:1.6;outline:none;resize:vertical;min-height:68px;color:var(--tx);font-family:var(--fn)}
.md-prev{padding:10px 12px;min-height:68px;font-size:13.5px;line-height:1.8;color:var(--tx2);display:none}

/* ── SIDEBAR OVERLAY ────────────────────────────────── */
.sb-ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:99}
.mob-toggle{display:none;position:fixed;top:11px;left:11px;z-index:95;width:33px;height:33px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sur);align-items:center;justify-content:center;font-size:16px;box-shadow:var(--sh);cursor:pointer;transition:left var(--tr),background var(--tr)}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInR{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-ovl.show{display:block}
  .mob-toggle{display:flex}
  .mob-toggle.sb-open{left:calc(var(--sw) + 8px);background:var(--bg2);border-color:var(--bd2)}
  .main{margin-left:0}
  .topbar{padding:9px 12px 9px 50px}
  .content{padding:12px 12px 40px}
  .banner{margin:10px 12px 0}
  .grid-view{grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px}
  .compact-view{grid-template-columns:1fr}
  .det-layout{flex-direction:column}
  .det-cover{width:90px}
  .fab{bottom:16px;right:16px;width:46px;height:46px;font-size:19px}
  .about-hero{flex-direction:column;text-align:center}
  .frow,.frow3{grid-template-columns:1fr}
  .sel-bar{bottom:10px}
  .mhd{padding:14px 16px 12px}
  .mbody{padding:14px 16px 18px}
  .mfoot{padding:11px 16px}
}
.hidden{display:none!important}
</style>
</head>

<div class="app">

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  藏·索引 v6 — 个人收藏管理平台
//  开源项目，欢迎修改使用
//  CONFIG 区块集中了所有可自定义内容
// ═══════════════════════════════════════════════════════════════

// ═══ CONFIG ════════════════════════════════════════════════════
// [1] 网站信息
const SITE = { title:'藏·索引', subtitle:'MY COLLECTION UNIVERSE', version:'v6', sk:'coll_v6' };

// [2] 收藏分类 (type:'book'→书籍字段, type:'media'→媒体字段)
const CATS = {
  books:  { label:'图书', icon:'📚', type:'book'  },
  anime:  { label:'番剧', icon:'🎌', type:'media' },
  movies: { label:'电影', icon:'🎬', type:'media' },
  series: { label:'剧集', icon:'📺', type:'media' },
  other:  { label:'其他', icon:'🗂️', type:'media' },
  // 示例（取消注释启用）:
  // manga:  { label:'漫画', icon:'📕', type:'book'  },
  // games:  { label:'游戏', icon:'🎮', type:'media' },
};

// [3] 状态选项 (id 请勿修改; label 可自定义)
const STATUS_BASE = [
  { id:'watched',   label:'✅ 已看', cls:'watched'   },
  { id:'watching',  label:'👁️ 在看', cls:'watching'  },
  { id:'unwatched', label:'⏳ 未看', cls:'unwatched' },
];

// [4] 国别标签
const COUNTRIES_BASE = [
  '🇨🇳 中国','🇺🇸 美国','🇯🇵 日本','🇩🇪 德国','🇫🇷 法国','🇬🇧 英国','🇰🇷 韩国',
  '🇮🇱 以色列','🇦🇹 奥地利','🇪🇸 西班牙','🇮🇳 印度','🇮🇹 意大利','🇷🇺 俄罗斯',
  '🇨🇦 加拿大','🇦🇺 澳大利亚','🇧🇷 巴西','🇲🇽 墨西哥','🇦🇷 阿根廷','🇸🇪 瑞典',
  '🇳🇴 挪威','🇩🇰 丹麦','🇳🇱 荷兰','🇵🇱 波兰','🇨🇿 捷克','🇵🇹 葡萄牙',
  '🇬🇷 希腊','🇹🇷 土耳其','🇪🇬 埃及','🇿🇦 南非','🇹🇭 泰国','🇻🇳 越南',
  '🇮🇩 印度尼西亚','🇲🇾 马来西亚','🇵🇭 菲律宾','🇸🇬 新加坡','🇺🇦 乌克兰',
  '🇮🇷 伊朗','🇸🇦 沙特','🇦🇪 阿联酋','🇳🇿 新西兰',
];

// [5] 类型标签
const TYPE_TAGS_BASE = [
  '⭐ 精选','💯 强推','🔥 年度佳作',
  '🧠 人生探讨','🌆 社会','💪 励志','🧠 心理','🔍 悬疑',
  '✍️ 文学','📚 小说','📝 自传','📰 传记','😂 喜剧','😢 悲剧','🎭 戏剧','❤️ 言情',
  '🔬 科普','📖 专业书籍','📐 教科书','💰 经济','⚔️ 军事',
  '🌀 玄幻','🧚 奇幻','🚀 科幻','👻 灵异','🔮 玄学','⏰ 穿越','🗺️ 架空','🌌 异世界',
  '📱 轻小说','⚡ 爽文','👨 男频','👩 女频','💕 后宫','🏫 校园','😌 休闲','🤪 怪诞',
  '🏙️ 都市','🌿 自然','🏔️ 冒险','🎨 艺术','🕊️ 和平',
  '🎮 游戏改编','🎵 音乐','🏆 体育','🤖 AI','🌊 海洋',
];

// ═══ DATA STORE ═════════════════════════════════════════════════
/*
  Item structure:
  {
    id, category, title, author, publisher, cast, voice,
    year, episodes, desc, notes, cover, links, tags,
    status, rating, createdAt, updatedAt, local,
    eps: [{            ← multi-episode entries
      id, title, type, year, cover, links, desc
    }]
  }

  Link structure:
  { name, url, type:'link'|'file', filename }

  Space structure:
  { id, name, items:[], createdAt }
*/
let store = {
  items: [],
  spaces: [],
  settings: {
    dark: false,
    githubToken: '', githubRepo: '', githubPath: 'collection.json',
    imgFolder: 'img', assetFolder: 'assets/doc',
    view: 'grid', sortBy: 'createdAt', autoSync: true,
    customCats: {}, customStatus: [], customCountries: [], customTags: [],
  }
};

// Runtime state
let curPage = 'books', curView = 'grid', curSort = 'createdAt';
let curSpace = null;
let filters = { status:[], tags:[] };
let searchQ = '';
let selectMode = false, selected = new Set();
let editId = null;
// Form temp state
let _links = [], _cover = '', _rating = 0, _tags = new Set();
let _eps = []; // temp episodes array

// ═══ HELPERS ════════════════════════════════════════════════════
const $ = s => document.getElementById(s);
const eh = s => !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ea = s => !s?'':String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const esc = s => !s?'':String(s).replace(/`/g,'\\`').replace(/\$/g,'\\$').replace(/'/g,"\\'");
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const isConn = () => !!(store.settings.githubToken && store.settings.githubRepo);
const getAllCats = () => ({...CATS,...(store.settings.customCats||{})});
const getAllStatus = () => [...STATUS_BASE,...(store.settings.customStatus||[])];
const getAllCountries = () => [...COUNTRIES_BASE,...(store.settings.customCountries||[])];
const getAllTypeTags = () => [...TYPE_TAGS_BASE,...(store.settings.customTags||[])];
const deepMerge = (t,s) => {
  const r={...t};
  for(const k of Object.keys(s)){
    if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k]))r[k]=deepMerge(t[k]||{},s[k]);
    else r[k]=s[k];
  }
  return r;
};

// ═══ INIT ════════════════════════════════════════════════════════
function init(){
  try{const raw=localStorage.getItem(SITE.sk);if(raw)store=deepMerge(store,JSON.parse(raw));}catch(e){}
  curView=store.settings.view||'grid';
  curSort=store.settings.sortBy||'createdAt';
  if(store.settings.dark)applyDark(true);
  setupPWA();
  $('site-title').textContent=SITE.title;
  $('site-sub').textContent=SITE.subtitle;
  $('site-ver').textContent=SITE.version;
  document.title=SITE.title;
  refreshGhStatus();
  renderSpaceNav();
  renderCustomCatNav();
  navigateTo('books');
  updateCounts();
}

function save(){
  store.settings.view=curView;
  store.settings.sortBy=curSort;
  localStorage.setItem(SITE.sk,JSON.stringify(store));
}

// ═══ NAVIGATION ══════════════════════════════════════════════════
function navigateTo(pg, spaceId=null){
  curSpace=spaceId; curPage=pg;
  document.querySelectorAll('.nav-btn[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===pg&&!spaceId));
  document.querySelectorAll('.space-nav-item').forEach(el=>el.classList.toggle('active',el.dataset.space===spaceId));
  const collPages=Object.keys(getAllCats());
  const inColl=collPages.includes(pg);
  $('fab').style.display=inColl?'flex':'none';
  $('sel-btn').style.display=inColl?'flex':'none';
  if(selectMode&&!inColl)exitSelectMode();
  const spObj=spaceId?store.spaces.find(s=>s.id===spaceId):null;
  const catObj=getAllCats()[pg];
  const pageTitles={stats:'📊 统计',about:'💡 关于本站',settings:'⚙️ 设置'};
  $('topbar-title').textContent=spaceId?`📦 ${spObj?.name||'空间'}`:catObj?`${catObj.icon} ${catObj.label}`:pageTitles[pg]||pg;
  renderBanner();
  renderContent();
  closeSidebar();
}

// ═══ BANNER ═══════════════════════════════════════════════════════
function renderBanner(){
  const w=$('banner-wrap');
  if(!Object.keys(getAllCats()).includes(curPage)||isConn()||curSpace){w.innerHTML='';return;}
  w.innerHTML=`<div class="banner">
    <span style="font-size:20px">🔒</span>
    <div style="flex:1"><strong style="color:var(--ac)">只读浏览模式</strong> — 未连接 GitHub 仓库。<br>
    <span style="font-size:11.5px">可新增本地记录（标记「本地」），连接后可选择同步上传。</span></div>
    <button class="gbtn p" onclick="navigateTo('settings')">连接 GitHub</button>
  </div>`;
}

// ═══ CONTENT ROUTER ═══════════════════════════════════════════════
function renderContent(){
  const c=$('content');
  if(curSpace){c.innerHTML=renderSpacePage();return;}
  if(curPage==='stats'){c.innerHTML=renderStats();return;}
  if(curPage==='folders'){c.innerHTML=renderFolderBrowser();return;}
  if(curPage==='about'){c.innerHTML=renderAbout();return;}
  if(curPage==='settings'){c.innerHTML=renderSettings();return;}
  const items=getFiltered();
  c.innerHTML=renderFilterBar()+renderViewCtrl(items.length)+(items.length?renderItems(items):renderEmpty());
}

// ═══ DATA HELPERS ═════════════════════════════════════════════════
function getItems(){
  if(curSpace){const sp=store.spaces.find(s=>s.id===curSpace);return(sp?.items||[]).filter(i=>i.category===curPage);}
  return store.items.filter(i=>i.category===curPage);
}

function matchesSearch(it,q){
  const lo=q.toLowerCase();
  return (it.title||'').toLowerCase().includes(lo)||
    (it.author||'').toLowerCase().includes(lo)||
    (it.publisher||'').toLowerCase().includes(lo)||
    (it.cast||'').toLowerCase().includes(lo)||
    (it.voice||'').toLowerCase().includes(lo)||
    (it.desc||'').toLowerCase().includes(lo)||
    (it.tags||[]).some(t=>t.toLowerCase().includes(lo))||
    (it.eps||[]).some(e=>(e.title||'').toLowerCase().includes(lo));
}

function getFiltered(){
  let items=getItems();
  if(searchQ)items=items.filter(it=>matchesSearch(it,searchQ));
  if(filters.status.length)items=items.filter(i=>filters.status.includes(i.status));
  if(filters.tags.length)items=items.filter(i=>filters.tags.every(t=>{
    if(t==='__local__')return i.local;
    return(i.tags||[]).includes(t);
  }));
  return sortItems(items);
}

function sortItems(items){
  return [...items].sort((a,b)=>{
    if(curSort==='title')return(a.title||'').localeCompare(b.title||'','zh');
    if(curSort==='rating')return(b.rating||0)-(a.rating||0);
    if(curSort==='year')return(b.year||'')>(a.year||'')?1:-1;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
}

function findItem(id_){
  if(curSpace){const sp=store.spaces.find(s=>s.id===curSpace);return sp?.items.find(i=>i.id===id_)||null;}
  return store.items.find(i=>i.id===id_)||null;
}

function isReadonly(item){
  if(curSpace)return true;
  if(!isConn()&&!item?.local)return true;
  return false;
}

// Move or copy a space item to the main store
function copyFromSpace(itemId, move=false){
  const sp=store.spaces.find(s=>s.id===curSpace);
  if(!sp)return;
  const item=sp.items.find(i=>i.id===itemId);
  if(!item)return;
  // Determine target category
  const catOpts=Object.entries(getAllCats()).map(([k,v])=>`<option value="${k}"${k===item.category?' selected':''}>${v.icon} ${v.label}</option>`).join('');
  const action=move?'移动':'复制';
  setM(`<div class="moverlay" id="sp-copy-m" onclick="closeM('sp-copy-m')">
    <div class="modal" style="max-width:340px" onclick="event.stopPropagation()">
      <div class="mhd"><div class="mtt">${action}到我的收藏</div><button class="mclose" onclick="closeM('sp-copy-m')">×</button></div>
      <div class="mbody">
        <div class="fg"><div class="fl"><span class="fl-label">目标分类</span></div>
          <select class="fi" id="sp-copy-cat">${catOpts}</select>
        </div>
        ${move?`<div style="font-size:12px;color:var(--tx3);background:var(--ambd);border-radius:var(--rs);padding:8px 10px;border:1px solid var(--amber)">
          ⚠️ 移动后该条目将从空间「${eh(sp.name)}」中删除
        </div>`:`<div style="font-size:12px;color:var(--tx3)">空间「${eh(sp.name)}」将保留该条目</div>`}
      </div>
      <div class="mfoot">
        <button class="btn" onclick="closeM('sp-copy-m')">取消</button>
        <button class="btn p" onclick="confirmCopyFromSpace('${itemId}',${move})">确认${action}</button>
      </div>
    </div>
  </div>`);
}

async function confirmCopyFromSpace(itemId, move){
  const sp=store.spaces.find(s=>s.id===curSpace);
  if(!sp)return;
  const item=sp.items.find(i=>i.id===itemId);
  if(!item)return;
  const cat=$('sp-copy-cat')?.value;
  if(!cat)return;
  // Add to main store with new id to avoid conflicts
  const newItem={...item, category:cat, id:uid(), local:!isConn(), createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
  store.items.unshift(newItem);
  if(move){
    sp.items=sp.items.filter(i=>i.id!==itemId);
  }
  save();updateCounts();closeM('sp-copy-m');closeM('det');
  renderSpaceNav();renderContent();
  toast(move?`已移动到 ${getAllCats()[cat]?.label}`:`已复制到 ${getAllCats()[cat]?.label}`,'ok');
  if(isConn()&&store.settings.autoSync)await syncToGH(true);
}

// ═══ FILTER BAR ═══════════════════════════════════════════════════
function renderFilterBar(){
  const all=getItems();
  const usedTags=[...new Set(all.flatMap(i=>i.tags||[]))];
  const usedCountries=usedTags.filter(t=>getAllCountries().includes(t));
  const usedTypes=usedTags.filter(t=>getAllTypeTags().includes(t));
  const hasLocal=all.some(i=>i.local);
  const hasF=filters.status.length||filters.tags.length;
  let h=`<div class="fbar">`;
  getAllStatus().forEach(s=>{h+=`<button class="ftag${filters.status.includes(s.id)?' on':''}" onclick="toggleSF('${s.id}')">${eh(s.label)}</button>`;});
  if(hasLocal)h+=`<button class="ftag${filters.tags.includes('__local__')?' on local':''}" onclick="toggleTF('__local__')">📍 本地</button>`;
  if(usedCountries.length){h+=`<span style="font-size:11px;color:var(--tx3);margin-left:2px">国别</span>`;usedCountries.forEach(t=>{h+=`<button class="ftag${filters.tags.includes(t)?' on':''}" onclick="toggleTF('${esc(t)}')">${eh(t)}</button>`;});}
  if(usedTypes.length){h+=`<span style="font-size:11px;color:var(--tx3);margin-left:2px">类型</span>`;usedTypes.forEach(t=>{h+=`<button class="ftag${filters.tags.includes(t)?' on':''}" onclick="toggleTF('${esc(t)}')">${eh(t)}</button>`;});}
  if(hasF)h+=`<button class="ftag" onclick="clearFilters()" style="color:var(--red);border-color:var(--red)">✕ 清除</button>`;
  return h+`</div>`;
}
function toggleSF(id_){const i=filters.status.indexOf(id_);i>-1?filters.status.splice(i,1):filters.status.push(id_);renderContent();}
function toggleTF(t){const i=filters.tags.indexOf(t);i>-1?filters.tags.splice(i,1):filters.tags.push(t);renderContent();}
function clearFilters(){filters={status:[],tags:[]};renderContent();}

// ═══ VIEW CONTROLS ════════════════════════════════════════════════
function renderViewCtrl(cnt){
  return `<div class="vctrl">
    <select class="vsel" onchange="setSort(this.value)">
      <option value="createdAt"${curSort==='createdAt'?' selected':''}>最近添加</option>
      <option value="title"${curSort==='title'?' selected':''}>名称</option>
      <option value="rating"${curSort==='rating'?' selected':''}>评分</option>
      <option value="year"${curSort==='year'?' selected':''}>年份</option>
    </select>
    <span class="vcnt">${cnt} 项</span>
    <div class="vbtns">
      <button class="vbtn${curView==='grid'?' on':''}" onclick="setView('grid')" title="卡片">▦</button>
      <button class="vbtn${curView==='list'?' on':''}" onclick="setView('list')" title="列表">≡</button>
      <button class="vbtn${curView==='compact'?' on':''}" onclick="setView('compact')" title="紧凑">⊟</button>
    </div>
  </div>`;
}
function setView(v){curView=v;save();renderContent();}
function setSort(v){curSort=v;save();renderContent();}

// ═══ RENDER ITEMS ════════════════════════════════════════════════
function renderItems(items){
  if(curView==='list')return renderList(items);
  if(curView==='compact')return renderCompact(items);
  return renderGrid(items);
}

function covHTML(item,cls=''){
  if(item.cover)return`<img src="${ea(item.cover)}" alt="" loading="lazy" onerror="this.parentElement.classList.add('nc-fallback');this.style.display='none'">`;
  return`<span class="nc-icon">${getAllCats()[item.category]?.icon||'📄'}</span>`;
}

function statusBadge(item){
  const s=getAllStatus().find(o=>o.id===item.status);
  if(!s)return'';
  const lmap={watched:'已看',watching:'在看',unwatched:'未看'};
  return`<span class="sbadge ${s.cls}">${lmap[item.status]||s.label.replace(/^[^\s]+\s/,'')}</span>`;
}
function localBadge(item){return item.local?`<span class="sbadge local">本地</span>`:''}
function epsBadge(item){return(item.eps&&item.eps.length)?`<span class="sbadge" style="background:var(--purple);color:#fff">${item.eps.length} 剧集</span>`:'';}

function miniStars(r){
  if(!r)return'';let h='';
  for(let n=1;n<=5;n++){
    const w=r>=n?'100%':r>=n-.5?'50%':'0%';
    h+=`<span style="position:relative;display:inline-block;color:var(--bd)">★<span style="position:absolute;left:0;top:0;overflow:hidden;width:${w};color:var(--amber)">★</span></span>`;
  }
  return`<span class="mini-stars">${h}<span style="font-family:var(--fm);font-size:9.5px;color:var(--tx3);margin-left:1px">${r}</span></span>`;
}

function cardClick(id_){if(selectMode)toggleSel(id_);else openDetail(id_);}
function cardCbox(id_){return`<div class="cbox${selected.has(id_)?' ck':''}" onclick="event.stopPropagation();toggleSel('${id_}')">${selected.has(id_)?'✓':''}</div>`;}

function renderGrid(items){
  return`<div class="grid-view${selectMode?' select-mode':''}">
  ${items.map(it=>`<div class="grid-card${selected.has(it.id)?' sel':''}" onclick="cardClick('${it.id}')">
    ${cardCbox(it.id)}
    <div class="cover-badge">${statusBadge(it)}</div>
    <div class="g-cov">${covHTML(it)}</div>
    <div class="g-info">
      <div class="g-title">${eh(it.title||'无标题')}</div>
      <div class="g-meta">${eh(it.author||it.year||'')}</div>

// ═══ GLOBAL SEARCH ════════════════════════════════════════════════
function onSearch(){
  searchQ=$('search-inp').value;
  const btn=$('search-clear');if(btn)btn.style.display=searchQ?'block':'none';
  if(searchQ.trim().length>=1)renderGlobalSearch(searchQ.trim());
  else renderContent();
}
function clearSearch(){
  searchQ='';const inp=$('search-inp');if(inp)inp.value='';
  const btn=$('search-clear');if(btn)btn.style.display='none';
  renderContent();
}
function renderGlobalSearch(q){
  const mainR=store.items.filter(it=>matchesSearch(it,q));
  const spaceR=[];
  store.spaces.forEach(sp=>sp.items.filter(it=>matchesSearch(it,q)).forEach(it=>spaceR.push({...it,_spaceName:sp.name,_spaceId:sp.id})));
  const total=mainR.length+spaceR.length;
  const byCat={};
  mainR.forEach(it=>{if(!byCat[it.category])byCat[it.category]=[];byCat[it.category].push(it);});
  let h=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <span style="font-size:14px;font-weight:600">🔍 "${eh(q)}"</span>
    <span style="font-size:12px;color:var(--tx3);font-family:var(--fm)">${total} 项结果</span>
    <button class="btn sm" onclick="clearSearch()">清除</button>
  </div>`;
  if(!total){h+=`<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">无结果</div><div class="empty-s">尝试其他关键词</div></div>`;}
  else{
    Object.entries(byCat).forEach(([cat,items])=>{
      const ci=getAllCats()[cat]||{icon:'📁',label:cat};
      const sv=curSpace,sv2=curView;curSpace=null;curView='list';
      const lh=renderItems(sortItems(items));
      curSpace=sv;curView=sv2;
      h+=`<div style="margin-bottom:18px"><div style="font-size:12.5px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px">${ci.icon} ${ci.label}<span style="font-size:11px;color:var(--tx3);font-weight:400">${items.length}项</span></div>${lh}</div>`;
    });
    if(spaceR.length){
      h+=`<div style="margin-bottom:18px"><div style="font-size:12.5px;font-weight:700;color:var(--blue);margin-bottom:8px">📦 导入空间 <span style="font-size:11px;color:var(--tx3);font-weight:400">${spaceR.length}项</span></div>
      <div class="list-view">${spaceR.map(it=>`
        <div class="list-card" onclick="openDetail('${it.id}')">
          <div class="l-cov">${covHTML(it)}</div>
          <div class="l-info">
            <div class="l-title">${eh(it.title||'无标题')} ${statusBadge(it)} <span class="sbadge local">${eh(it._spaceName)}</span></div>
            <div class="l-meta">${getAllCats()[it.category]?.icon||''} ${getAllCats()[it.category]?.label||it.category}${it.author?` · 👤 ${eh(it.author)}`:''}</div>
            ${it.desc?`<div class="l-desc">${eh(it.desc)}</div>`:''}
          </div>
        </div>`).join('')}</div></div>`;
    }
  }
  $('content').innerHTML=h;
}

// ═══ RATING ═══════════════════════════════════════════════════════
function renderStarsHTML(r){
  let h='';
  for(let n=1;n<=5;n++){
    const w=r>=n?'100%':r>=n-.5?'50%':'0%';
    h+=`<span class="star-w" onmousemove="hoverStar(event,this,${n})" onmouseleave="unhoverStars()" onclick="clickStar(event,this,${n})">
      <span class="sbg">★</span><span class="sfill" style="width:${w}">★</span></span>`;
  }
  return h+`<span class="slbl" id="slbl">${r?r+' 分':'未评分'}</span>`;
}
function hoverStar(e,el,n){
  const rect=el.getBoundingClientRect();
  const v=e.clientX<rect.left+rect.width/2?n-.5:n;
  document.querySelectorAll('.sfill').forEach((sf,i)=>sf.style.width=v>=(i+1)?'100%':v>=(i+.5)?'50%':'0%');
  const lbl=$('slbl');if(lbl)lbl.textContent=v+' 分';
}
function unhoverStars(){
  document.querySelectorAll('.sfill').forEach((sf,i)=>sf.style.width=_rating>=(i+1)?'100%':_rating>=(i+.5)?'50%':'0%');
  const lbl=$('slbl');if(lbl)lbl.textContent=_rating?_rating+' 分':'未评分';
}
function clickStar(e,el,n){
  const rect=el.getBoundingClientRect();
  const v=e.clientX<rect.left+rect.width/2?n-.5:n;
  _rating=_rating===v?0:v;$('stars').innerHTML=renderStarsHTML(_rating);
}

function pickCountry(v){
  if(v)_tags.add(v);

}
function removeCountry(t){
  _tags.delete(t);refreshCountryUI();
}
function refreshCountryUI(){
  const chips=$('country-chips');if(chips)chips.innerHTML=renderCountryChips();
  const sel=$('f-country');if(!sel)return;
  sel.value='';
  [...sel.options].forEach(opt=>{
    if(opt.value&&_tags.has(opt.value)){opt.disabled=true;if(!opt.text.endsWith(' ✓'))opt.text=opt.text+' ✓';}
    else{opt.disabled=false;opt.text=opt.text.replace(/ ✓$/,'');}
  });
}
function toggleTT(btn,t){if(_tags.has(t)){_tags.delete(t);btn.classList.remove('on');}else{_tags.add(t);btn.classList.add('on');}}

// ═══ COVER UPLOAD ═════════════════════════════════════════════════
function handleCovFile(e){
  const f=e.target.files[0];if(!f)return;
  toast('压缩处理中…','info');
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const MAX=640;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      _cover=c.toDataURL('image/jpeg',.8);
      applyCovPreview(_cover);toast('图片已压缩','ok');
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}
function applyCovUrl(){_cover=$('cov-url')?.value?.trim()||'';applyCovPreview(_cover);}
function applyCovPreview(src){

          <a href="${ea(l.url)}" target="_blank" class="btn xs">↗ 打开</a>
          <button class="btn xs" onclick="copyText('${ea(l.url)}')">📋 复制链接</button>
          <button class="btn xs" onclick="showQR('${ea(l.url)}','${ea(l.name||l.filename||'下载')}')">📱 二维码</button>
          <button class="btn xs d" onclick="confirmDelAsset('${prefix}',${i})">🗑️ 删除文件</button>
        </div>`:''}

function getLinkArr(prefix){return prefix==='ll'?_links:(prefix.startsWith('ep-')?getEpLinks(prefix):_links);}
function getEpLinks(prefix){
  const idx=parseInt(prefix.replace('ep-',''));
  return _eps[idx]?.links||[];
}
function setLinkArr(prefix,arr){
  if(prefix==='ll'){_links=arr;}
  else if(prefix.startsWith('ep-')){
    const idx=parseInt(prefix.replace('ep-',''));
    if(_eps[idx])_eps[idx].links=arr;
  }
}
function updateLink(prefix,i,key,val){
  const arr=getLinkArr(prefix);if(arr[i])arr[i][key]=val;
}
function setLT(prefix,i,type){
  const arr=getLinkArr(prefix);
  if(!arr[i])return;
  arr[i].type=type;
  if(type==='link'){delete arr[i].filename;arr[i]._uploading=false;}
  rerenderLinks(prefix);
}
function rmLink(prefix,i){
  const arr=getLinkArr(prefix);
  if(!arr[i])return;
  const l=arr[i];
  if(l.type==='file'&&l.url){
    if(!confirm(`⚠️ 移除此链接条目。\n\nGitHub 文件「${l.filename||l.name}」将保留在仓库中。\n如需同时删除文件，请先点「删除文件」按钮。\n\n确认移除？`))return;
  }
  arr.splice(i,1);setLinkArr(prefix,arr);rerenderLinks(prefix);
}
function addLink(){_links.push({name:`链接${_links.length+1}`,url:'',type:'link'});rerenderLinks('ll');}
function rerenderLinks(prefix){
  const arr=getLinkArr(prefix);
  const el=$(prefix==='ll'?'ll':prefix+'-links');
  if(el)el.innerHTML=renderLinkRows(arr,prefix);
}

function confirmDelAsset(prefix,i){
  const arr=getLinkArr(prefix);const l=arr[i];
  if(!confirm(`⚠️ 永久删除 GitHub 文件：「${l.filename||l.name}」\n\n【此操作不可撤回！】\n请确认：\n• 无其他记录共用此下载链接\n• 此链接未曾单独分享给他人\n\n确认删除文件？`))return;
  deleteGHAsset(l.url,l.filename||'file').then(()=>{
    arr[i].url='';arr[i].filename='';rerenderLinks(prefix);
  });
}

async function uploadLinkFile(e,prefix,i){
  const f=e.target.files[0];if(!f)return;
  const arr=getLinkArr(prefix);
  arr[i].filename=f.name;arr[i]._uploading=true;rerenderLinks(prefix);
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  const dir=(assetFolder||'assets/doc').replace(/\/$/,'');
  const path=`${dir}/${f.name}`;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result.split(',')[1];
    try{
      let sha=null;
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;}
      const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
        method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
        body:JSON.stringify({message:`Upload ${f.name}`,content:b64,...(sha?{sha}:{})})
      });
      if(pr.ok){
        const d=await pr.json();
        arr[i].url=d.content?.download_url||`https://raw.githubusercontent.com/${repo}/main/${path}`;
        arr[i]._uploading=false;toast(`${f.name} 已上传`,'ok');
      }else{arr[i]._uploading=false;toast('上传失败','err');}
    }catch(err){arr[i]._uploading=false;toast(`错误:${err.message}`,'err');}
    rerenderLinks(prefix);
  };
  reader.readAsDataURL(f);
}

async function pickExistingFile(prefix,i){
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  if(!tk||!repo){toast('请先连接 GitHub','err');return;}
  const dir=(assetFolder||'assets/doc').replace(/\/$/,'');
  setM(`<div class="moverlay" id="pf-m" onclick="closeM('pf-m')">
    <div class="modal" style="max-width:460px" onclick="event.stopPropagation()">
      <div class="mhd"><div class="mtt">📁 选择已有文件</div><button class="mclose" onclick="closeM('pf-m')">×</button></div>
      <div class="mbody">
        <p style="font-size:12px;color:var(--tx3);margin-bottom:10px">仓库 ${eh(dir)}/ 中的文件：</p>
        <div id="pf-list" style="display:flex;flex-direction:column;gap:6px">
          <div style="text-align:center;padding:20px;color:var(--tx3)">加载中…</div>
        </div>
      </div>
    </div>
  </div>`);
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${dir}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    const el=$('pf-list');if(!el)return;
    if(!r.ok){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3)">文件夹不存在</div>';return;}
    const files=await r.json();
    if(!files.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3)">暂无文件</div>';return;}
    el.innerHTML=files.map(f=>`
      <div class="fm-item" onclick="selectExFile('${prefix}',${i},'${ea(f.download_url)}','${ea(f.name)}')" style="cursor:pointer">
        <span style="font-size:16px">📄</span>
        <span class="fm-name">${eh(f.name)}</span>
        <span class="fm-size">${(f.size/1024).toFixed(1)} KB</span>
        <span style="font-size:11px;color:var(--ac)">选用 →</span>
      </div>`).join('');
  }catch(e){const el=$('pf-list');if(el)el.innerHTML='<div style="color:var(--red);text-align:center;padding:20px">加载失败</div>';}
}
function selectExFile(prefix,i,url,fn){
  const arr=getLinkArr(prefix);
  if(arr[i]){arr[i].url=url;arr[i].filename=fn;arr[i].type='file';}
  closeM('pf-m');rerenderLinks(prefix);toast(`已选「${fn}」`,'ok');
}

function addEp(){

function rmEp(i){
  const ep=_eps[i];

function rerenderEps(){const el=$('eps-list');if(el)el.innerHTML=renderEpEditors();}
function renderEpRatingHTML(r,i){
  let h='';
  for(let n=1;n<=5;n++){
    const w=r>=n?'100%':r>=n-.5?'50%':'0%';
    h+=`<span class="star-w" style="width:18px;height:18px;font-size:17px"
      onmousemove="hoverEpStar(event,this,${i},${n})"
      onmouseleave="unhoverEpStars(${i})"
      onclick="clickEpStar(event,this,${i},${n})">
      <span class="sbg">★</span><span class="sfill" style="width:${w}">★</span></span>`;
  }
  return h+`<span class="slbl" id="ep-slbl-${i}" style="font-size:11px">${r?r+' 分':'未评分'}</span>`;
}
function hoverEpStar(e,el,i,n){
  const rect=el.getBoundingClientRect();
  const v=e.clientX<rect.left+rect.width/2?n-.5:n;
  const container=el.closest('.ep-stars');
  if(container)container.querySelectorAll('.sfill').forEach((sf,j)=>sf.style.width=v>=(j+1)?'100%':v>=(j+.5)?'50%':'0%');
  const lbl=$(`ep-slbl-${i}`);if(lbl)lbl.textContent=v+' 分';
}
function unhoverEpStars(i){
  const r=_eps[i]?.rating||0;
  const container=document.querySelector(`#ep-editor-${i} .ep-stars`);
  if(container)container.querySelectorAll('.sfill').forEach((sf,j)=>sf.style.width=r>=(j+1)?'100%':r>=(j+.5)?'50%':'0%');
  const lbl=$(`ep-slbl-${i}`);if(lbl)lbl.textContent=r?r+' 分':'未评分';
}
function clickEpStar(e,el,i,n){
  const rect=el.getBoundingClientRect();
  const v=e.clientX<rect.left+rect.width/2?n-.5:n;
  if(!_eps[i])return;
  _eps[i].rating=_eps[i].rating===v?0:v;

  const starsEl=document.querySelector(`#ep-editor-${i} .ep-stars`);
  if(starsEl)starsEl.innerHTML=renderEpRatingHTML(_eps[i].rating,i);
  const lbl=$(`ep-slbl-${i}`);if(lbl)lbl.textContent=_eps[i].rating?_eps[i].rating+' 分':'未评分';
}

function epCovClick(i){$('ep-cov-file-'+i)?.click();}
function handleEpCovFile(e,i){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      _eps[i].cover=c.toDataURL('image/jpeg',.8);
      rerenderEps();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}
function updateEpCovPreview(i,src){
  const el=$('ep-editor-'+i);
  if(!el)return;
  const thumb=el.querySelector('.ep-cov-thumb');
  if(thumb){thumb.innerHTML=src?`<img src="${ea(src)}" alt="" onerror="this.style.display='none'">`:'+';} 
}
function addEpLink(i){

  _eps[i].links.push({name:`链接${_eps[i].links.length+1}`,url:'',type:'link'});
  rerenderLinks('ep-'+i);
}

async function saveItem(){
  const title=$('f-title')?.value?.trim();
  if(!title){toast('请填写名称','err');return;}
  const stBtn=document.querySelector('#sp-opts .sp-opt.on');
  const status=stBtn?.dataset.val||'unwatched';
  const wasLocal=editId?store.items.find(i=>i.id===editId)?.local:null;
  const item={
    id:editId||uid(),
    category:curPage,
    title,
    author:$('f-author')?.value?.trim()||'',
    publisher:$('f-publisher')?.value?.trim()||'',
    cast:$('f-cast')?.value?.trim()||'',
    voice:$('f-voice')?.value?.trim()||'',
    year:$('f-year')?.value?.trim()||'',
    episodes:$('f-episodes')?.value?.trim()||'',
    desc:mdVal('f-desc')?.trim()||'',
    notes:mdVal('f-notes')?.trim()||'',
    cover:_cover,
    links:_links.filter(l=>l.url).map(l=>({name:l.name,url:l.url,type:l.type||'link',filename:l.filename})),
    tags:[..._tags],
    status,
    rating:_rating,
    eps:_eps.map(ep=>({
      id:ep.id||uid(),
      title:ep.title,
      type:ep.type,
      year:ep.year,
      cover:ep.cover,
      desc:ep.desc,
      notes:ep.notes||'',
      rating:ep.rating||0,
      links:(ep.links||[]).filter(l=>l.url).map(l=>({name:l.name,url:l.url,type:l.type||'link',filename:l.filename}))
    })).filter(ep=>ep.title),
    createdAt:editId?(store.items.find(i=>i.id===editId)?.createdAt||new Date().toISOString()):new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    local:isConn()?false:true,
  };
  if(editId&&wasLocal!==null)item.local=wasLocal;
  if(editId){const idx=store.items.findIndex(i=>i.id===editId);if(idx>-1)store.items[idx]=item;}
  else store.items.unshift(item);
  save();closeM('add-m');updateCounts();renderContent();
  toast(editId?'已更新':'已添加','ok');
  if(isConn()&&store.settings.autoSync)await syncToGH(true);
}

// ═══ DELETE ITEM ══════════════════════════════════════════════════
async function deleteItem(itemId){
  const item=store.items.find(i=>i.id===itemId);if(!item)return;
  const fileLinks=[
    ...(item.links||[]).filter(l=>l.type==='file'&&l.url),
    ...(item.eps||[]).flatMap(ep=>(ep.links||[]).filter(l=>l.type==='file'&&l.url))
  ];
  let msg='确认删除此记录？';
  if(fileLinks.length){
    msg=`⚠️ 此记录包含 ${fileLinks.length} 个已上传到 GitHub 的附件：\n`+
      fileLinks.map(l=>`• ${l.filename||l.name}`).join('\n')+
      `\n\n删除记录后文件仍保留在 GitHub 仓库中。\n如需同时删除文件，请先在编辑页面逐个处理后再删除。\n\n确认删除记录？`;
  }
  if(!confirm(msg))return;
  store.items=store.items.filter(i=>i.id!==itemId);
  save();updateCounts();closeM('det');renderContent();
  toast('已删除','ok');
  if(isConn())await syncToGH(true);
}

// ═══ GITHUB — DELETE ASSET ════════════════════════════════════════
async function deleteGHAsset(fileUrl,filename){
  const {githubToken:tk,githubRepo:repo}=store.settings;
  if(!tk||!repo){toast('未连接 GitHub','info');return;}
  let path='';
  try{
    const u=new URL(fileUrl);
    if(u.hostname.includes('raw.githubusercontent.com')){
      path=u.pathname.split('/').slice(4).join('/');
    }else{
      const dir=(store.settings.assetFolder||'assets/doc').replace(/\/$/,'');
      path=`${dir}/${filename}`;
    }
  }catch{
    const dir=(store.settings.assetFolder||'assets/doc').replace(/\/$/,'');
    path=`${dir}/${filename}`;
  }
  if(!path){toast('无法确定文件路径','err');return;}
  try{
    const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(!gr.ok){toast('文件不存在或已删除','info');return;}
    const fd=await gr.json();
    const dr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'DELETE',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Delete ${filename}`,sha:fd.sha})
    });
    if(dr.ok)toast(`「${filename}」已永久删除`,'ok');
    else toast('删除失败，请检查权限','err');
  }catch(e){toast(`错误:${e.message}`,'err');}
}

// ═══ GITHUB SYNC ══════════════════════════════════════════════════
function refreshGhStatus(){
  const dot=$('gh-dot'),lbl=$('gh-lbl');if(!dot||!lbl)return;
  if(isConn()){dot.className='gh-dot ok';lbl.textContent=store.settings.githubRepo;}
  else{dot.className='gh-dot';lbl.textContent='未连接 GitHub';}

async function syncToGH(silent=false){
  const {githubToken:tk,githubRepo:repo,githubPath:path}=store.settings;
  if(!tk||!repo)return false;
  const dot=$('gh-dot');if(dot)dot.className='gh-dot busy';
  try{
    let sha=null;
    const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(gr.ok){const d=await gr.json();sha=d.sha;}
    else if(gr.status===401||gr.status===403){if(dot)dot.className='gh-dot err';toast('Token 无效或权限不足，请检查 GitHub Token 设置','err');return false;}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(store.items,null,2))));
    const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Update ${new Date().toISOString()}`,content,...(sha?{sha}:{})})
    });
    if(pr.ok){
      if(dot)dot.className='gh-dot ok';
      if(!silent)toast('已同步到 GitHub ✅','ok');
      // After successful push, re-render to reflect any changes
      updateCounts();renderContent();
      return true;
    }else{
      const err=await pr.json();if(dot)dot.className='gh-dot err';
      const m=err.message||'';
      toast(m.includes('not accessible')?'推送失败：Token 权限不足，需开启 Contents 读写权限':`推送失败：${m}`,'err');
      return false;
    }
  }catch(e){if(dot)dot.className='gh-dot err';if(!silent)toast(`网络错误：${e.message}`,'err');return false;}
}

async function pullFromGH(){
  const {githubToken:tk,githubRepo:repo,githubPath:path}=store.settings;
  if(!tk||!repo){toast('请先配置 GitHub','err');return null;}
  const dot=$('gh-dot');if(dot)dot.className='gh-dot busy';
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(!r.ok){
      if(dot)dot.className='gh-dot err';
      toast(r.status===401||r.status===403?'Token 无效':'拉取失败，文件可能不存在','err');
      return null;
    }
    const d=await r.json();
    if(dot)dot.className='gh-dot ok';
    return JSON.parse(decodeURIComponent(escape(atob(d.content))));
  }catch(e){if(dot)dot.className='gh-dot err';toast(`拉取错误：${e.message}`,'err');return null;}
}

async function connectGithubFlow(){
  const remote=await pullFromGH();if(!remote)return;
  const local=store.items.filter(i=>i.local);
  if(!local.length){
    store.items=remote;save();updateCounts();renderContent();
    toast(`已从 GitHub 拉取 ${remote.length} 条记录`,'ok');return;
  }
  window._ri=remote;
  setM(`<div class="moverlay" id="conn-m">
    <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
      <div class="mhd"><div class="mtt">🔗 连接 GitHub</div></div>
      <div class="mbody">
        <p style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:14px">
          检测到 <strong style="color:var(--ac)">${local.length} 条本地记录</strong>，GitHub 上有 <strong style="color:var(--ac)">${remote.length} 条记录</strong>。
        </p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn p" onclick="_mergeUp()">📤 上传本地并与 GitHub 合并</button>
          <button class="btn" onclick="_keepBoth()">📥 拉取 GitHub 记录（本地记录标「本地」保留）</button>
          <button class="btn" onclick="_expPull()">💾 先导出本地 JSON，再加载 GitHub 数据</button>

window._mergeUp=async function(){
  const r=window._ri||[];
  const m=[...r];
  store.items.filter(i=>i.local).forEach(li=>{if(!m.find(x=>x.id===li.id)){li.local=false;m.unshift(li);}});
  store.items=m;save();updateCounts();closeM('conn-m');
  renderSpaceNav();renderCustomCatNav();renderContent();
  await syncToGH(false);
};
window._keepBoth=function(){
  const r=window._ri||[];const lo=store.items.filter(i=>i.local);
  store.items=[...lo,...r.filter(x=>!lo.find(l=>l.id===x.id))];
  save();updateCounts();closeM('conn-m');
  renderSpaceNav();renderCustomCatNav();renderContent();
  toast(`合并完成，共 ${store.items.length} 条，页面已更新 ✅`,'ok');
};
window._expPull=function(){
  doExportItems(store.items);store.items=window._ri||[];
  save();updateCounts();closeM('conn-m');
  renderSpaceNav();renderCustomCatNav();renderContent();
  toast('已导出并加载 GitHub 数据，页面已更新 ✅','ok');
};

      let sha=null;
      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
      if(gr.ok){const d=await gr.json();sha=d.sha;}
      const pr=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
        method:'PUT',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
        body:JSON.stringify({message:`Upload ${f.name}`,content:b64,...(sha?{sha}:{})})
      });
      if(pr.ok){toast(`${f.name} 上传成功`,'ok');loadFmList();}
      else toast('上传失败','err');
    }catch(err){toast(`错误:${err.message}`,'err');}
  };
  r2.readAsDataURL(f);
}
async function loadFmList(){
  const {githubToken:tk,githubRepo:repo,assetFolder}=store.settings;
  const dir=(assetFolder||'assets/doc').replace(/\/$/,'');
  const el=$('fm-list');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3)">加载中…</div>';
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${dir}`,{headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(!r.ok){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3)">文件夹为空或不存在</div>';return;}
    const files=await r.json();
    if(!files.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3)">暂无文件</div>';return;}
    el.innerHTML=files.map(f=>`
      <div class="fm-item">
        <span style="font-size:16px">📄</span>
        <span class="fm-name">${eh(f.name)}</span>
        <span class="fm-size">${(f.size/1024).toFixed(1)} KB</span>
        <a href="${f.download_url}" target="_blank" class="btn xs">⬇️</a>
        <button class="btn xs" onclick="copyText('${f.download_url}')">📋</button>
        <button class="btn xs" onclick="showQR('${f.download_url}','${eh(f.name)}')">📱</button>
        <button class="btn xs d" onclick="fmDelete('${f.path}','${f.sha}','${eh(f.name)}')">🗑️</button>
      </div>`).join('');
  }catch(e){el.innerHTML=`<div style="color:var(--red);text-align:center;padding:20px">加载失败：${e.message}</div>`;}
}
async function fmDelete(path,sha,name){
  if(!confirm(`⚠️ 永久删除「${name}」？\n\n【不可撤回！】请确认：\n• 无其他记录共用此链接\n• 此链接未曾单独分享给他人`))return;
  const {githubToken:tk,githubRepo:repo}=store.settings;
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'DELETE',headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Delete ${name}`,sha})
    });
    if(r.ok){toast(`${name} 已删除`,'ok');loadFmList();}
    else toast('删除失败','err');
  }catch(e){toast(`错误：${e.message}`,'err');}
}

function copyText(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>toast('已复制','ok')).catch(()=>copyFB(text));}
  else copyFB(text);
}
function copyFB(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('已复制','ok');}catch{toast('复制失败','err');}
  document.body.removeChild(ta);
}
function showQR(url,name){
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;
