// Stats page has its own view state so it doesn't conflict with collection views
let statsView = 'list';

function setStatsView(v){
  statsView=v;
  // Only re-render the recent items section, not the whole stats page
  const rEl=$('stats-recent-list');
  const rCtrl=$('stats-view-ctrl');
  const all=store.items;
  const recent=[...all].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  if(rCtrl) rCtrl.innerHTML=renderStatsViewCtrl(recent.length);
  if(rEl){
    const sv=curView; curView=statsView;
    rEl.innerHTML=recent.length?renderItems(recent):renderEmpty();
    curView=sv;
  }
}

function renderStatsViewCtrl(cnt){
  return `<div class="vctrl" id="stats-view-ctrl">
    <span class="vcnt">${cnt} 项</span>
    <div class="vbtns">
      <button class="vbtn${statsView==='grid'?' on':''}" onclick="setStatsView('grid')" title="卡片">▦</button>
      <button class="vbtn${statsView==='list'?' on':''}" onclick="setStatsView('list')" title="列表">≡</button>
      <button class="vbtn${statsView==='compact'?' on':''}" onclick="setStatsView('compact')" title="紧凑">⊟</button>
    </div>
  </div>`;
}

function renderStats(){
  const all=store.items;
  const total=all.length;
  const watched=all.filter(i=>i.status==='watched').length;
  const watching=all.filter(i=>i.status==='watching').length;
  const rated=all.filter(i=>i.rating);
  const avgR=rated.length?(rated.reduce((s,i)=>s+i.rating,0)/rated.length).toFixed(1):'-';
  const catCards=Object.entries(getAllCats()).map(([k,v])=>{
    const ci=all.filter(i=>i.category===k);
    const cr=ci.filter(i=>i.rating);
    const ar=cr.length?(cr.reduce((s,i)=>s+i.rating,0)/cr.length).toFixed(1):'-';
    return`<div class="stat-c"><div class="stat-v">${ci.length}</div><div class="stat-l">${v.icon} ${v.label}</div><div class="stat-r">⭐ ${ar}</div></div>`;
  }).join('');
  const tagCount={};all.forEach(i=>(i.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));
  const topTags=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const recent=[...all].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  // Render recent items using statsView (independent from main curView)
  const sv=curView; curView=statsView;
  const recentH=recent.length?renderItems(recent):renderEmpty();
  curView=sv;
  return`<div>
    <div style="font-family:var(--fs);font-size:19px;font-weight:600;margin-bottom:13px">📊 统计概览</div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-v">${total}</div><div class="stat-l">总收藏</div></div>
      <div class="stat-c"><div class="stat-v">${watched}</div><div class="stat-l">✅ 已看</div></div>
      <div class="stat-c"><div class="stat-v">${watching}</div><div class="stat-l">👁️ 在看</div></div>
      <div class="stat-c"><div class="stat-v">${avgR}</div><div class="stat-l">⭐ 均分</div></div>
      ${catCards}
    </div>
    ${topTags.length?`<div style="margin-bottom:16px">
      <div class="stg-tt">🏷️ 热门标签 Top ${topTags.length}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${topTags.map(([t,n],i)=>`<span class="tchip">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]} ${eh(t)} <span style="font-family:var(--fm);color:var(--ac)">${n}</span></span>`).join('')}
      </div></div>`:''}
    <div style="font-family:var(--fs);font-size:16px;font-weight:600;margin-bottom:11px">🕐 最近添加</div>
    <div id="stats-view-ctrl">${renderStatsViewCtrl(recent.length)}</div>
    <div id="stats-recent-list">${recentH}</div>
  </div>`;
}

function saveGhSettings(){

  store.settings.githubPath=$('gh-path')?.value?.trim()||'collection.json';

  store.settings.assetFolder=$('gh-asset')?.value?.trim()||'assets/doc';
  save();refreshGhStatus();toast('设置已保存','ok');

}
function toggleAutoSync(){
  store.settings.autoSync=!store.settings.autoSync;
  const t=$('autosync-t');if(t)t.classList.toggle('on',store.settings.autoSync);save();
}
async function doPull(){
  const items=await pullFromGH();if(!items)return;
  const lo=store.items.filter(i=>i.local);
  if(lo.length&&!confirm(`你有 ${lo.length} 条本地记录，拉取后将合并（本地记录保留）。确认？`))return;
  store.items=[...lo,...items.filter(r=>!lo.find(l=>l.id===r.id))];
  save();
  updateCounts();
  renderSpaceNav();
  renderCustomCatNav();
  renderContent();
  toast(`已拉取 ${items.length} 条记录，页面已更新 ✅`,'ok');
}

function handleImportSettings(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.type!=='coll_settings'||!d.settings){toast('不是有效的设置文件','err');return;}
      openImportSettingsModal(d.settings);
    }catch{toast('无法解析文件','err');}
  };
  r.readAsText(f);e.target.value='';
}

function confirmImportSettings(){
  const settings=window._importSettings;if(!settings)return;
  const mode=document.querySelector('input[name="spm"]:checked')?.value||'merge';
  if(mode==='overwrite_all'){
    const clearItems=$('spm-clear-items')?.checked;
    // Clear all custom settings
    store.settings.customCats={};
    store.settings.customStatus=[];
    store.settings.customCountries=[];
    store.settings.customTags=[];
    if(clearItems){store.items=[];store.spaces=[];}
    // Import all from settings file
    Object.keys(settings).forEach(k=>{if(store.settings[k]!==undefined)store.settings[k]=settings[k];});
    save();updateCounts();renderContent();renderSpaceNav();renderCustomCatNav();
    toast(`设置已完全覆盖${clearItems?'（记录已清空）':''}，请刷新验证`,'ok');
  } else if(mode==='overwrite'){
    // Overwrite each key entirely
    Object.keys(settings).forEach(k=>{if(store.settings[k]!==undefined)store.settings[k]=settings[k];});
    save();renderContent();renderCustomCatNav();
    toast('设置已覆盖导入','ok');
  } else {
    // Merge: only add items that don't exist
    let added=0;
    // customCats: add keys that don't exist
    const myCats=store.settings.customCats||{};
    Object.entries(settings.customCats||{}).forEach(([k,v])=>{if(!CATS[k]&&!myCats[k]){myCats[k]=v;added++;}});
    store.settings.customCats=myCats;
    // customStatus: add ids that don't exist
    const mySt=store.settings.customStatus||[];
    const myStIds=new Set([...STATUS_BASE.map(s=>s.id),...mySt.map(s=>s.id)]);
    (settings.customStatus||[]).forEach(s=>{if(!myStIds.has(s.id)){mySt.push(s);added++;}});
    store.settings.customStatus=mySt;
    // customCountries: add strings that don't exist
    const myCtry=store.settings.customCountries||[];
    const myCtrySet=new Set([...COUNTRIES_BASE,...myCtry]);
    (settings.customCountries||[]).forEach(t=>{if(!myCtrySet.has(t)){myCtry.push(t);added++;}});
    store.settings.customCountries=myCtry;
    // customTags: add strings that don't exist
    const myTags=store.settings.customTags||[];
    const myTagSet=new Set([...TYPE_TAGS_BASE,...myTags]);
    (settings.customTags||[]).forEach(t=>{if(!myTagSet.has(t)){myTags.push(t);added++;}});
    store.settings.customTags=myTags;
    save();renderContent();renderCustomCatNav();
    toast(`合并导入完成，新增 ${added} 项设置`,'ok');
  }
  closeM('imps-m');
}

function renderFolderBrowser(){

    var avgR=rated.length?(rated.reduce(function(s,i){return s+i.rating;},0)/rated.length).toFixed(1):'—';

        +(folSelMode?'<div class="fold-cbox'+(isSel?' ck':'')+'" style="position:static;margin-right:4px">'+(isSel?'✓':'')+'</div>':'')

async function confirmFolDel(keys){
  var mode=document.querySelector('input[name="fdm"]:checked')?.value||'archive';
  if(mode==='del'){if(!confirm('将彻底删除 '+keys.length+' 个分类及全部记录，不可恢复，确认？'))return;

  else{
    if(!store.settings.customCats)store.settings.customCats={};
    if(!store.settings.customCats.archive&&!CATS.archive)store.settings.customCats.archive={label:'归档',icon:'🗄️',type:'media'};

function toast(msg,type='ok'){
  const c=$('toasts');
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${eh(msg)}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);
}

// ═══ MARKDOWN EDITOR ════════════════════════════════════════════
// Toolbar-based markdown editor. Uses data-attributes to avoid quote nesting.
// Safe to call inside template literals because it returns a plain string.

function mdEditorHTML(id, ph, val, rows) {
  ph = ph || '';
  val = val || '';
  rows = rows || 3;
  // Build toolbar using array join - no quote nesting issues
  var btns = [
    ['h1','H1','一级标题','style="font-size:10px;width:auto;padding:0 5px"'],
    ['h2','H2','二级标题','style="font-size:10px;width:auto;padding:0 5px"'],
    ['h3','H3','三级标题','style="font-size:10px;width:auto;padding:0 5px"'],
    ['|'],
    ['bold','B','加粗 Ctrl+B','style="font-weight:700"'],
    ['italic','I','斜体 Ctrl+I','style="font-style:italic"'],
    ['strike','S','删除线','style="text-decoration:line-through"'],
    ['icode','&lt;/&gt;','行内代码','style="font-family:monospace;font-size:11px"'],
    ['|'],
    ['ul','•','无序列表','style="font-size:16px"'],
    ['ol','1.','有序列表','style="font-size:10px;width:auto;padding:0 3px"'],
    ['check','☑','任务列表','style="font-size:11px"'],
    ['|'],
    ['quote','&ldquo;','引用块','style="font-size:16px"'],
    ['codeblock','`·`','代码块','style="font-size:10px;width:auto;padding:0 3px"'],
    ['table','⊞','插入表格','style="font-size:12px"'],
    ['hr','—','分割线',''],
    ['|'],
    ['preview','预览','预览/编辑','style="font-size:11px;width:auto;padding:0 6px"']
  ];
  var toolbar = btns.map(function(b) {
    if(b[0] === '|') return '<div class="md-sep"></div>';
    if(b[0] === 'color') return '<span class="md-btn" style="position:relative" title="字体颜色"><span style="border-bottom:2px solid var(--ac);padding:0 2px;cursor:pointer" onclick="document.getElementById(\'mdc-'+id+'\').click()">A</span><input type="color" id="mdc-'+id+'" value="#c8773a" onchange="mdColor(\''+id+'\',this.value)" style="position:absolute;opacity:0;width:0;height:0"></span>';
    if(b[0] === 'preview') return '<button class="md-btn" id="mdpb-'+id+'" data-mde="'+id+'" data-cmd="preview" onclick="mdToggle(this.dataset.mde)" '+b[3]+'>'+b[1]+'</button>';
    return '<button class="md-btn" data-mde="'+id+'" data-cmd="'+b[0]+'" onclick="mdFmt(this.dataset.mde,this.dataset.cmd)" title="'+b[2]+'" '+b[3]+'>'+b[1]+'</button>';
  }).join('');
  // Color button inserted after icode
  toolbar = toolbar.replace(
    '<div class="md-sep"></div><button class="md-btn" data-mde="'+id+'" data-cmd="ul"',
    '<span class="md-btn" style="position:relative" title="字体颜色"><span style="border-bottom:2px solid var(--ac);padding:0 2px;cursor:pointer" onclick="document.getElementById(\'mdc-'+id+'\').click()">A</span><input type="color" id="mdc-'+id+'" value="#c8773a" onchange="mdColor(\''+id+'\',this.value)" style="position:absolute;opacity:0;width:0;height:0"></span><div class="md-sep"></div><button class="md-btn" data-mde="'+id+'" data-cmd="ul"'
  );
  return '<div class="md-wrap" id="mde-'+id+'">'
    + '<div class="md-bar">'+toolbar+'</div>'
    + '<textarea id="mdta-'+id+'" data-mde="'+id+'" placeholder="'+ph+'" rows="'+rows+'"'
    + ' style="width:100%;border:none;background:transparent;padding:8px 11px;font-size:13.5px;line-height:1.6;outline:none;resize:vertical;min-height:68px;color:var(--tx);font-family:var(--fn)"'
    + ' onkeydown="mdKey(event,this.dataset.mde)">'+val+'</textarea>'
    + '<div id="mdpv-'+id+'" class="md-prev mdc"></div>'
    + '</div>';
}

function mdTA(id){ return document.getElementById('mdta-'+id); }
function mdVal(id){ var t=mdTA(id); return t?t.value:''; }

function mdFmt(id, fmt) {
  var ta=mdTA(id); if(!ta) return;
  var s=ta.selectionStart, e=ta.selectionEnd;
  var sel=ta.value.substring(s,e);
  var bef=ta.value.substring(0,s);
  var aft=ta.value.substring(e);
  var ins='';
  var q=String.fromCharCode(96); // backtick
  if(fmt==='bold')      ins='**'+(sel||'粗体文字')+'**';
  else if(fmt==='italic')   ins='*'+(sel||'斜体文字')+'*';
  else if(fmt==='strike')   ins='~~'+(sel||'删除文字')+'~~';
  else if(fmt==='icode')    ins=q+(sel||'代码')+q;
  else if(fmt==='h1')       ins='# '+(sel||'标题')+'\n';
  else if(fmt==='h2')       ins='## '+(sel||'标题')+'\n';
  else if(fmt==='h3')       ins='### '+(sel||'标题')+'\n';
  else if(fmt==='ul')       ins=sel?sel.split('\n').map(function(l){return l?'- '+l:l;}).join('\n'):'- 列表项\n';
  else if(fmt==='ol')       ins=sel?sel.split('\n').map(function(l,i){return l?(i+1)+'. '+l:l;}).join('\n'):'1. 列表项\n';
  else if(fmt==='check')    ins=sel?sel.split('\n').map(function(l){return l?'- [ ] '+l:l;}).join('\n'):'- [ ] 待办\n';
  else if(fmt==='quote')    ins=sel?sel.split('\n').map(function(l){return '> '+l;}).join('\n'):'> 引用\n';
  else if(fmt==='codeblock') ins=q+q+q+'\n'+(sel||'// 代码')+'\n'+q+q+q+'\n';
  else if(fmt==='hr')        ins='\n---\n';
  else if(fmt==='table')     ins='\n| 列1 | 列2 | 列3 |\n|---|---|---|\n| 内容 | 内容 | 内容 |\n';
  else ins=sel;
  ta.value=bef+ins+aft;
  ta.focus();
  ta.setSelectionRange(s, s+ins.length);
  ta.dispatchEvent(new Event('input',{bubbles:true}));
}

function mdColor(id, color) {
  var ta=mdTA(id); if(!ta) return;
  var s=ta.selectionStart, e=ta.selectionEnd;
  var sel=ta.value.substring(s,e)||'彩色文字';
  var ins='<span style="color:'+color+'">'+sel+'</span>';
  ta.value=ta.value.substring(0,s)+ins+ta.value.substring(e);
  ta.focus(); ta.dispatchEvent(new Event('input',{bubbles:true}));
}

function mdToggle(id) {
  var ta=mdTA(id);
  var pv=document.getElementById('mdpv-'+id);
  var pb=document.getElementById('mdpb-'+id);
  if(!ta||!pv) return;
  var showing=pv.style.display==='block';
  if(showing){pv.style.display='none';ta.style.display='';if(pb)pb.textContent='预览';}
  else{pv.innerHTML=marked.parse(ta.value||'');pv.style.display='block';ta.style.display='none';if(pb)pb.textContent='编辑';}
}

function mdKey(e, id) {
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();mdFmt(id,'bold');}
  else if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();mdFmt(id,'italic');}
  else if(e.key==='Tab'){e.preventDefault();var ta=mdTA(id);if(!ta)return;var s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd);ta.setSelectionRange(s+2,s+2);}
}


function drawLogoOnCanvas(size){
  try{
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const r=size*0.22;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#c8773a');g.addColorStop(1,'#8b4d1e');
    ctx.fillStyle=g;ctx.fill();
    const books=[{y:.63,w:.66,h:.12,a:.22,sa:.5},{y:.49,w:.60,h:.12,a:.30,sa:.65},{y:.35,w:.52,h:.12,a:.42,sa:.90}];
    books.forEach(b=>{
      const bx=(size-b.w*size)/2,by=b.y*size,bw=b.w*size,bh=b.h*size;
      ctx.fillStyle='rgba(255,255,255,'+b.a+')';
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,size*.04);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,'+b.sa+')';
      ctx.beginPath();ctx.roundRect(bx,by,size*.06,bh,size*.03);ctx.fill();
    });
    ctx.fillStyle='rgba(255,255,255,.93)';
    ctx.font='bold '+Math.round(size*.24)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('藏',size/2,size*.30);
    return c.toDataURL('image/png');
  }catch(e){return null;}
}

function setupPWA(){
  const svgStr='<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="pgl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#c8773a"/><stop offset="100%" style="stop-color:#8b4d1e"/></linearGradient></defs><rect width="100" height="100" rx="22" fill="url(#pgl)"/><rect x="17" y="63" width="66" height="12" rx="4" fill="rgba(255,255,255,.22)"/><rect x="17" y="63" width="6" height="12" rx="3" fill="rgba(255,255,255,.5)"/><rect x="21" y="49" width="60" height="12" rx="4" fill="rgba(255,255,255,.3)"/><rect x="21" y="49" width="6" height="12" rx="3" fill="rgba(255,255,255,.65)"/><rect x="25" y="35" width="52" height="12" rx="4" fill="rgba(255,255,255,.42)"/><rect x="25" y="35" width="6" height="12" rx="3" fill="rgba(255,255,255,.9)"/><text x="50" y="32" font-family="serif" font-size="23" font-weight="700" text-anchor="middle" fill="white" opacity=".92">藏</text></svg>';
  const svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  const png192=drawLogoOnCanvas(192)||svgUrl;
  const png512=drawLogoOnCanvas(512)||svgUrl;
  const fav=$('favicon'),ai=$('apple-icon');
  const ti=new Image();
  ti.onload=()=>{if(fav)fav.href='img/logo.ico';if(ai)ai.href='img/logo.ico';};
  ti.onerror=()=>{if(fav)fav.href=png192;if(ai)ai.href=png192;};
  ti.src='img/logo.ico?v='+Date.now();
  const manifest={
    name:SITE.title,short_name:'藏索引',start_url:'.',display:'standalone',
    background_color:'#f6f3ee',theme_color:'#c8773a',
    icons:[
      {src:png192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:png512,sizes:'512x512',type:'image/png',purpose:'any maskable'},
      {src:svgUrl,sizes:'any',type:'image/svg+xml'}
    ]
  };
  try{const b=new Blob([JSON.stringify(manifest)],{type:'application/json'});$('pwa-manifest').href=URL.createObjectURL(b);}catch(e){}
  if('serviceWorker' in navigator){
    try{
      const sw='self.addEventListener("fetch",e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));';
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
    }catch(e){}
  }
}
